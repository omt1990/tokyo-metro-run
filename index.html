body{font-family:'Noto Sans JP',sans-serif;background:#f7f8f5;color:#141413;min-height:100vh}

.bcell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);border-radius:14px;padding:4px;position:relative;overflow:hidden;border:1px solid var(--border)}
.bcell.hit{background:#eef8f2;border-color:#84c19a}

.bcell.pend{background:#fff5e8;border-color:#f0c280}
.bcell.free{background:#f5fbfd;border-color:var(--metro-blue)}
.bcell.bline{background:#eef8fc;border-color:var(--cyan)}
.bcell.bline.mb{background:#f4effb;border-color:var(--purple)}

.admin-tabs{display:flex;gap:6px;margin-bottom:12px}

.appr-btns{display:flex;gap:6px;margin-top:8px}

.appr-ng{background:rgba(230,0,18,.15);color:var(--red);border:1px solid rgba(230,0,18,.3)}

.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}

.rule-hero{padding:32px 20px 20px;text-align:center}

.toggle.on::after{left:19px}

.toast.ok{border-color:var(--green)}.toast.bingo{border-color:var(--cyan)}
.toast.warn{border-color:var(--orange)}.toast.ev{border-color:var(--red)}.toast.ms{border-color:var(--purple)}

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

});
const _db=firebase.database();
function stripPhotos(s){
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map(l=>({...l,photo:l.photo?'__local__':null}))}));
  if(r.pendingApprovals)r.pendingApprovals=r.pendingApprovals.map(a=>({...a,photo:a.photo?'__local__':null}));
  return r;
}
function savePhotos(code,s){
  const p={};
  (s.teams||[]).forEach(t=>(t.logs||[]).forEach((l,i)=>{if(l.photo&&l.photo!=='__local__')p[`l_${t.id}_${i}`]=l.photo}));
  (s.pendingApprovals||[]).forEach(a=>{if(a.photo&&a.photo!=='__local__')p[`a_${a.id}`]=a.photo});
  try{localStorage.setItem(`ph_${code}`,JSON.stringify(p))}catch(e){}
}
function mergePhotos(code,s){
  let p={};try{p=JSON.parse(localStorage.getItem(`ph_${code}`)||'{}')}catch(e){}
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map((l,i)=>({...l,photo:l.photo==='__local__'?(p[`l_${t.id}_${i}`]||null):l.photo}))}));

// ── HELPERS ──
const STATION_CARD_TARGETS={1:4,2:12,3:4};
const FIXED_CORNER_COUNT=2;
const RANDOM_CORNER_COUNT=2;
function shuffle(list){return [...list].sort(()=>Math.random()-.5)}
function withStationMeta(st,routeMode){
  return{
    ...st,
    difficulty:st.diff,
    isFixedCornerCandidate:!!st.fixed,
    availableRouteModes:st.op==='toei'?['full']:['metro','full'],
    routeMode,
  };
}
function getPool(routeMode){
  const base=routeMode==='full'?[...ALL_STATIONS,...TOEI_STATIONS]:ALL_STATIONS;
  return base.map(st=>withStationMeta(st,routeMode));
}
function pickStations(pool,count){
  return shuffle(pool).slice(0,Math.max(0,count));
}
function buildStationPools(routeMode='metro'){
  const pool=getPool(routeMode);
  return{
    all:pool,
    fixedCorners:pool.filter(s=>s.isFixedCornerCandidate),
    randomCorners:pool.filter(s=>s.difficulty===3&&!s.isFixedCornerCandidate),
    byDifficulty:{
      1:pool.filter(s=>s.difficulty===1),
      2:pool.filter(s=>s.difficulty===2),
      3:pool.filter(s=>s.difficulty===3),
    },
  };
}
function allocateDifficultySlots(pools,usedIds){
  const selected=[];
  const remainingByDifficulty={
    1:pools.byDifficulty[1].filter(s=>!usedIds.has(s.id)),
    2:pools.byDifficulty[2].filter(s=>!usedIds.has(s.id)),
    3:pools.byDifficulty[3].filter(s=>!usedIds.has(s.id)),
  };
  const take=(difficulty,count)=>{
    const chosen=pickStations(remainingByDifficulty[difficulty],count);
    chosen.forEach(st=>usedIds.add(st.id));
    remainingByDifficulty[difficulty]=remainingByDifficulty[difficulty].filter(st=>!usedIds.has(st.id));
    selected.push(...chosen);
    return count-chosen.length;
  };

  let shortage=take(2,STATION_CARD_TARGETS[2]);
  if(shortage>0)shortage=take(1,shortage);
  if(shortage>0)take(3,shortage);

  shortage=take(1,STATION_CARD_TARGETS[1]);
  if(shortage>0)shortage=take(3,shortage);
  if(shortage>0)take(2,shortage);

  shortage=take(3,STATION_CARD_TARGETS[3]);
  if(shortage>0)shortage=take(1,shortage);
  if(shortage>0)take(2,shortage);

  return selected;
}
function placeStationsOnBoard(corners,normal){
  const card=new Array(25).fill(null);
  card[12]={id:'FREE',name:'FREE',line:null,isFree:true};
  let ci=0,ni=0;
  for(let i=0;i<25;i++){
    if(i===12)continue;
    card[i]=CORNER_INDICES.includes(i)?corners[ci++]:normal[ni++];
  }
  return card;
}
function genStationCard(routeMode='metro'){
  const pools=buildStationPools(routeMode);
  const fixedCorner=pickStations(pools.fixedCorners,FIXED_CORNER_COUNT);
  const usedIds=new Set(fixedCorner.map(s=>s.id));
  const randomCorner=pickStations(
    pools.randomCorners.filter(s=>!usedIds.has(s.id)),
    RANDOM_CORNER_COUNT
  );
  randomCorner.forEach(st=>usedIds.add(st.id));
  const corners=shuffle([...fixedCorner,...randomCorner]);
  const normal=shuffle(allocateDifficultySlots(pools,usedIds));
  return placeStationsOnBoard(corners,normal);
}
function genMissionCard(missions){
  const pool=missions||DEFAULT_MISSIONS;
  const sh=[...pool].sort(()=>Math.random()-.5).slice(0,24);
  return [...Array(25)].map((_,i)=>i===12?{id:'FREE',name:'FREE',isFree:true}:sh[i-(i>12?1:0)]);
}
function checkBingo(card,reached){
  if(!card||!reached)return[];
  const lines=[];const ok=i=>card[i]&&(card[i].isFree||reached.has(card[i].id));
  for(let r=0;r<5;r++){const c=[0,1,2,3,4].map(x=>r*5+x);if(c.every(ok))lines.push(c)}
  for(let c=0;c<5;c++){const r=[0,1,2,3,4].map(x=>x*5+c);if(r.every(ok))lines.push(r)}
  if([0,6,12,18,24].every(ok))lines.push([0,6,12,18,24]);
  if([4,8,12,16,20].every(ok))lines.push([4,8,12,16,20]);
  return lines;
}
function calcScore(team,config){
  if(!team)return{stB:0,msB:0,masks:0,total:0};
  const stR=new Set(team.stationReached||[]);
  const msR=new Set(team.missionReached||[]);
  const stBingo=checkBingo(team.stationCard,stR);
  const msBingo=checkBingo(team.missionCard,msR);
  const stMasks=(team.stationReached||[]).filter(id=>id!=='FREE').length;
  const msMasks=(team.missionReached||[]).filter(id=>id!=='FREE').length;
  const mode=config?.mode||'basic';
  const gp=(team.goalPenalty||0)+(team.manualScoreDelta||0);
  if(mode==='basic'){return{stB:stBingo.length,msB:0,masks:stMasks,total:stMasks+stBingo.length*3+gp}}
  const total=(stBingo.length+1)*(msBingo.length+1)+gp;
  return{stB:stBingo.length,msB:msBingo.length,masks:stMasks+msMasks,total};
}

function createTeam(index,cfg,missions){

    id:`t${index+1}`,
    name:teamLabel(index),
    color:TEAM_COLORS[index%TEAM_COLORS.length],
    stationCard:genStationCard(cfg.routeMode),
    missionCard:cfg.mode==='double'?genMissionCard(missions):null,
    stationReached:['FREE'],
    missionReached:['FREE'],
    missionSubmissions:{},
    goalPenalty:0,
    manualScoreDelta:0,
    logs:[{type:'st',title:`${teamLabel(index)} を作成`,sub:'大会準備中',time:nowTime()}],
  };
}
function createTeams(count,cfg,missions){
  return Array.from({length:Math.max(2,count||2)},(_,i)=>createTeam(i,cfg,missions));
}
function syncTeamsToCount(teams,count,cfg,missions){
  let next=[...(teams||[])];
  const target=Math.max(2,count||2);
  while(next.length<target)next=[...next,createTeam(next.length,cfg,missions)];
  while(next.length>target){
    const last=next[next.length-1];
    const hasMembers=(last.memberIds||[]).length>0;
    if(hasMembers)break;
    next=next.slice(0,-1);
  }
  return next;
}
function hydrateTeamMembers(gameState){
  const participants=(gameState?.participants||[]).filter(p=>p.active!==false);
  const teams=(gameState?.teams||[]).map(team=>({
    ...team,
    memberIds:participants.filter(p=>p.teamId===team.id&&p.status==='assigned').map(p=>p.id),
  }));
  return {...gameState,teams};
}
function canJoinGame(gameState){
  return ['recruiting','team_building'].includes(gameState?.state);
}
function canEditTeams(gameState){
  return ['recruiting','team_building'].includes(gameState?.state);
}
function getStartBlockers(gameState){
  const teams=gameState?.teams||[];
  const counts=getParticipantCounts(gameState);
  const assignedByTeam=teams.map(team=>counts.assigned.filter(p=>p.teamId===team.id).length);
  const blockers=[];
  if(teams.length<2)blockers.push('最低2チーム必要です');
  if(assignedByTeam.some(count=>count===0))blockers.push('各チームに最低1人ずつ割り当ててください');
  if(counts.joined.length>0)blockers.push('未割り当ての参加者がいます');
  return blockers;
}
function canStartGame(gameState){return getStartBlockers(gameState).length===0}
function autoAssignParticipants(gameState){
  const teams=[...(gameState?.teams||[])];
  const participants=[...(gameState?.participants||[])];
  const unassigned=participants.filter(p=>p.active!==false&&p.status==='joined'&&!p.teamId);
  const counts=teams.map(team=>participants.filter(p=>p.active!==false&&p.status==='assigned'&&p.teamId===team.id).length);
  const sorted=teams.map((team,index)=>({team,index,count:counts[index]})).sort((a,b)=>a.count-b.count||a.index-b.index);
  const nextParticipants=participants.map(p=>({...p}));
  unassigned.forEach((participant,idx)=>{
    const target=sorted[idx%sorted.length];
    const ref=nextParticipants.find(p=>p.id===participant.id);
    ref.teamId=target.team.id;
    ref.status='assigned';
    target.count+=1;
    sorted.sort((a,b)=>a.count-b.count||a.index-b.index);
  });
  return hydrateTeamMembers({...gameState,participants:nextParticipants});
}
function buildRuleSummary(gameState){
  const cfg=gameState?.config||{};
  const lines=[
    'トランプを1枚引き、出た数だけ上りか下りを選んで移動します。',
    '路線の端まで来たら折り返します。',
    '到着した駅は写真付きで記録してください。',
    cfg.mode==='double'
      ?'ダブルビンゴは駅ビンゴとミッションビンゴを同時進行します。'
      :'ベーシックは駅ビンゴのみで進行します。',
  ];
  const diffRules=[
    `大会名：${gameState?.title||'未設定'}`,
    `開催状態：${gameState?.state||'recruiting'}`,
    `スタート駅：${gameState?.startStationName||gameState?.startStationId||'未設定'}`,
    `開始〜終了：${gameState?.startAt||'-'} 〜 ${gameState?.endAt||'-'}`,
    gameState?.extras?.goalStation?`ゴール駅：${gameState.extras.goalStation}`:'ゴール駅：未設定',
    gameState?.extras?.goalCondition?`ゴール条件：${gameState.extras.goalCondition}`:'ゴール条件：未設定',
    gameState?.rules?.custom?`追加ルール：${gameState.rules.custom}`:'追加ルール：なし',
  ];
  return{common:lines,diff:diffRules};
}
function initGame(form,missions){
  const cfg=form.config;
  const teams=createTeams(cfg.teamCount, cfg, missions);
  const code=genCode();
  return hydrateTeamMembers({
    gameCode:code,

    extras:{

    auditLogs:[{id:`audit_${Date.now()}`,type:'system',time:nowTime(),message:`大会「${form.title}」を作成`}],
  });
}

        </div>
        <div className={`ms-badge ${done?'ms-done':pend?'ms-pend':rej?'ms-rej':'ms-none'}`}>
          {done?'承認済':pend?'審査中':rej?'却下':'未達成'}
        </div>
      </div>;
    })}
  </div>;
}

// ── SCORE PAGE ──
function ScorePage({gameState,myTeamId,isFinished}){
  const config=gameState.config;const mode=config?.mode||'basic';
  const teams=[...(gameState.teams||[])].map(t=>({...t,...calcScore(t,config)}));
  const myTeam=teams.find(t=>t.id===myTeamId);
  const renderBoard=(team)=>(
    <div key={team.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:12,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <div className="dot" style={{background:team.color,width:10,height:10}}></div>
        <div style={{fontWeight:700}}>{team.name}</div>
        <div style={{marginLeft:'auto',fontFamily:'Barlow Condensed',fontSize:26,color:'var(--navy)'}}>{team.total}pt</div>
      </div>
      <div className="bgrid" style={{marginBottom:8}}>
        {(team.stationCard||[]).map((cell,i)=>{
          const hit=cell.isFree||(team.stationReached||[]).includes(cell.id);
          return<div key={i} className={`bcell ${hit&&!cell.isFree?'hit':''} ${cell.isFree?'free':''}`}>
            <div className="bnm">{cell.isFree?'FREE':cell.name}</div>
          </div>;
        })}
      </div>
      <div>{[...(team.logs||[])].slice(-6).reverse().map((log,i)=>(
        <div key={i} className="li">
          <div className={`lic ${log.type}`}>{log.type==='s'?'📍':log.type==='bingo'?'🎯':log.type==='ms'?'🏅':log.type==='ev'?'⚡':'📝'}</div>
          <div className="lb"><div className="lt">{log.title}</div><div className="ls">{log.sub}</div></div>
          <div className="ltm">{log.time}</div>
        </div>
      ))}</div>
    </div>
  );
  if(isFinished)return<div>
    <p className="sec">終了後リザルト</p>
    {teams.map(renderBoard)}
  </div>;
  if(!myTeam)return<div className="empty">チームに割り当てられるとスコアが表示されます</div>;
  return<div>
    <p className="sec">得点内訳</p>
    {mode==='double'?<div className="multiply-display">
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>スコア計算式</div>
      <div className="multiply-formula">({myTeam.stB}+1)×({myTeam.msB}+1)={myTeam.total}</div>
    </div>:<div className="score-detail">
      <div className="score-row"><span className="lbl">マス（{myTeam.masks}×1pt）</span><span className="val">{myTeam.masks}pt</span></div>
      <div className="score-row"><span className="lbl">ビンゴ（{myTeam.stB}列×3pt）</span><span className="val">{myTeam.stB*3}pt</span></div>
      <div className="score-row"><span>合計</span><span className="val" style={{fontSize:22}}>{myTeam.total}pt</span></div>
    </div>}
    <p className="sec">プレイログ</p>
    <div>{[...(myTeam.logs||[])].reverse().map((log,i)=>(
      <div key={i} className="li">
        <div className={`lic ${log.type}`}>{log.type==='s'?'📍':log.type==='bingo'?'🎯':log.type==='ms'?'🏅':log.type==='ev'?'⚡':'📝'}</div>
        <div className="lb"><div className="lt">{log.title}</div><div className="ls">{log.sub}</div>
          {log.photo&&<img src={log.photo} style={{width:'100%',maxHeight:70,objectFit:'cover',borderRadius:5,marginTop:5}} alt=""/>}
        </div>
        <div className="ltm">{log.time}</div>
      </div>
    ))}</div>
  </div>;
}

}

// ── ORGANIZER SETUP ──
function OrganizerSetup({onCreateGame,onBack}){
  const now=new Date();
  const plusHours=new Date(now.getTime()+8*60*60*1000);
  const [gameMode,setGameMode]=useState('double');
  const [routeMode,setRouteMode]=useState('metro');
  const [title,setTitle]=useState('');
  const [startAt,setStartAt]=useState(now.toISOString().slice(0,16));
  const [endAt,setEndAt]=useState(plusHours.toISOString().slice(0,16));
  const [startStationId,setStartStationId]=useState('otemachi');
  const [playerLimit,setPlayerLimit]=useState(8);
  const [teamCount,setTeamCount]=useState(2);
  const [goalEnabled,setGoalEnabled]=useState(false);
  const [missions,setMissions]=useState(DEFAULT_MISSIONS.map(m=>({...m,enabled:true})));
  const [events,setEvents]=useState([
    {id:'e1',name:'ライブ会場キャパ対決',desc:'午前中に最大収容人数のライブ会場を発見！13:00に合流して発表',type:'time',scheduledTime:'13:00',reward:'任意1マス',status:'pending',triggeredAt:null},
  ]);
  const [goalStation,setGoalStation]=useState('');
  const [goalCondition,setGoalCondition]=useState('');
  const [meetupPoint,setMeetupPoint]=useState('');
  const [meetupTime,setMeetupTime]=useState('');
  const [customRules,setCustomRules]=useState('');
  const [loading,setLoading]=useState(false);

  const enabledMissions=missions.filter(m=>m.enabled);
  const startPool=getPool(routeMode);

  const handleCreate=async()=>{
    if(!title.trim()||!startAt||!endAt||!startStationId)return;
    setLoading(true);
    const cfg={mode:gameMode,routeMode,gameDuration:Math.max(1,new Date(endAt)-new Date(startAt)),
      teamCount,playerLimit,goalEnabled,goalAmount:goalEnabled?-5:0};
    const station=startPool.find(s=>s.id===startStationId);
    await onCreateGame({
      title:title.trim(),
      startAt,
      endAt,
      startStationId,
      startStationName:station?.name||startStationId,
      goalStation,
      goalCondition,
      meetupPoint,
      meetupTime,
      customRules,
      config:cfg,
      events,
    },enabledMissions);
    setLoading(false);
  };

  return<div className="center-overlay" style={{alignItems:'flex-start',paddingTop:20}}>
    <div className="modal">
      <button className="btn ghost" style={{marginTop:0,marginBottom:8,textAlign:'left',width:'auto',padding:'4px 0'}} onClick={onBack}>← トップに戻る</button>
      <div className="modal-title">大会を作成</div>
      <input className="modal-input left" placeholder="大会名" value={title} onChange={e=>setTitle(e.target.value)}/>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>開始時刻</div>
      <input className="sinp" type="datetime-local" value={startAt} onChange={e=>setStartAt(e.target.value)}/>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>終了時刻</div>
      <input className="sinp" type="datetime-local" value={endAt} onChange={e=>setEndAt(e.target.value)}/>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>スタート駅</div>
      <select className="sinp" value={startStationId} onChange={e=>setStartStationId(e.target.value)}>
        {startPool.map(st=><option key={st.id} value={st.id}>{st.name}</option>)}
      </select>
      <div className="mode-card" style={{borderColor:gameMode==='basic'?'var(--cyan)':'var(--border)'}} onClick={()=>setGameMode('basic')}>
        <div className="mode-card-title">🎰 ベーシック</div>
      </div>
      <div className="mode-card" style={{borderColor:gameMode==='double'?'var(--purple)':'var(--border)'}} onClick={()=>setGameMode('double')}>
        <div className="mode-card-title">🎯 ダブルビンゴ</div>
      </div>
      <div className="route-row">
        <button className={`route-btn ${routeMode==='metro'?'sel':''}`} onClick={()=>setRouteMode('metro')}>🚇 メトロのみ</button>
        <button className={`route-btn ${routeMode==='full'?'sel':''}`} onClick={()=>setRouteMode('full')}>🚇 メトロ＋都営</button>
      </div>
      <div style={{background:'var(--surface-sub)',borderRadius:18,padding:'4px 14px',marginBottom:10,border:'1px solid var(--border)'}}>
        <div className="custom-row">
          <span className="custom-label">プレイヤー数</span>
          <div className="num-input">
            <button className="num-btn" onClick={()=>setPlayerLimit(n=>Math.max(1,n-1))}>−</button>
            <span className="custom-value">{playerLimit}人</span>
            <button className="num-btn" onClick={()=>setPlayerLimit(n=>n+1)}>+</button>
          </div>
        </div>
        <div className="custom-row">
          <span className="custom-label">チーム数</span>
          <div className="num-input">
            <button className="num-btn" onClick={()=>setTeamCount(n=>Math.max(2,n-1))}>−</button>
            <span className="custom-value">{teamCount}チーム</span>
            <button className="num-btn" onClick={()=>setTeamCount(n=>n+1)}>+</button>
          </div>
        </div>
        <div className="custom-row">
          <span className="custom-label">ゴールペナルティ</span>
          <div className="toggle-row">
            <div className={`toggle ${goalEnabled?'on':''}`} onClick={()=>setGoalEnabled(v=>!v)}></div>
            <span style={{fontSize:11,color:goalEnabled?'var(--green)':'var(--muted)'}}>{goalEnabled?'ON（-5pt）':'OFF'}</span>
          </div>
        </div>
      </div>
      {gameMode==='double'&&<div style={{maxHeight:180,overflowY:'auto',marginBottom:10}}>
        {missions.map((m,i)=>(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>setMissions(ms=>ms.map((mm,j)=>j===i?{...mm,enabled:!mm.enabled}:mm))}>
            <div style={{width:18,height:18,borderRadius:4,background:m.enabled?'var(--green)':'var(--surface)',border:`1px solid ${m.enabled?'var(--green)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
              {m.enabled&&<span style={{fontSize:10,color:'white'}}>✓</span>}
            </div>
            <span style={{fontSize:11}}>{m.icon} {m.text}</span>
          </div>
        ))}
      </div>}
      <p className="sec">将来拡張用の任意項目</p>
      <input className="sinp sm" placeholder="ゴール駅" value={goalStation} onChange={e=>setGoalStation(e.target.value)}/>
      <input className="sinp sm" placeholder="ゴール条件" value={goalCondition} onChange={e=>setGoalCondition(e.target.value)}/>
      <input className="sinp sm" placeholder="合流地点" value={meetupPoint} onChange={e=>setMeetupPoint(e.target.value)}/>
      <input className="sinp sm" placeholder="合流時間" value={meetupTime} onChange={e=>setMeetupTime(e.target.value)}/>
      <textarea className="sinp" placeholder="大会ごとの差分ルール" value={customRules} onChange={e=>setCustomRules(e.target.value)} style={{minHeight:80}}/>
      <button className="btn pri" disabled={loading||!title.trim()||!startAt||!endAt||!startStationId} onClick={handleCreate}>
        {loading?'作成中...':'🚀 ゲームコードを発行する'}
      </button>
    </div>
  </div>;
}

function PlayerJoin({onJoin,onBack}){
  const [code,setCode]=useState('');
  const [playerName,setPlayerName]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  return<div className="center-overlay">
    <div className="modal">
      <button className="btn ghost" style={{marginTop:0,marginBottom:8,textAlign:'left',width:'auto',padding:'4px 0'}} onClick={onBack}>← 戻る</button>
      <div className="modal-title">ゲームに参加</div>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:5}}>主催者から共有されたコードを入力</div>
      <input className="modal-input" placeholder="XXXXXX" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={6}/>
      <input className="modal-input left" placeholder="プレイヤー名を入力..." value={playerName} onChange={e=>setPlayerName(e.target.value)} style={{marginBottom:8}}/>

  setMyParticipantId(null);

// ── MAIN APP ──
function App(){
  const [screen,setScreen]=useState('start'); // start|organizer|player|admin|game
  const [gameState,setGameState]=useState(null);
  const [myParticipantId,setMyParticipantId]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [showRule,setShowRule]=useState(false);
  const [tab,setTab]=useState('home');
  const [toasts,setToasts]=useState([]);
  const [showShare,setShowShare]=useState(false);
  const [nowTs,setNowTs]=useState(Date.now());
  const [sessionReady,setSessionReady]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    const iv=setInterval(()=>{
      setNowTs(Date.now());
      setGameState(prev=>{
        if(!prev)return prev;
        let changed=false;
        let next={...prev};
        const t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        const events=(next.events||[]).map(ev=>{
          if(ev.type==='time'&&ev.status==='pending'&&ev.scheduledTime===t){changed=true;return{...ev,status:'active',triggeredAt:Date.now()}}
          return ev;
        });
        if(changed){
          const activated=events.filter(ev=>ev.type==='time'&&ev.status==='active'&&!(next.events||[]).find(prevEv=>prevEv.id===ev.id&&prevEv.status==='active'));
          next={...next,events,teams:(next.teams||[]).map(team=>({...team,logs:[...(team.logs||[]),...activated.map(ev=>({type:'ev',title:'イベント自動発動',sub:ev.name,time:nowTime()}))]}))};
        }
        if(next.state==='in_progress'&&next.endAt&&Date.now()>=new Date(next.endAt).getTime()){
          changed=true;
          next={...next,state:'finished',finishedAt:isoNow(),auditLogs:[...(next.auditLogs||[]),{id:`audit_${Date.now()}`,type:'system',time:nowTime(),message:'大会を自動終了'}]};
        }
        if(!changed)return prev;
        const gs=hydrateTeamMembers(next);fbSave(gs.gameCode,gs);return gs;
      });
    },1000);
    return()=>clearInterval(iv);
  },[]);

  const showToast=useCallback((t)=>{
    const id=Date.now();
    setToasts(p=>[...p,{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const subGame=useCallback((code)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=fbSub(code,ns=>{
      const hydrated=hydrateTeamMembers(ns);
      setGameState(prev=>{
        const hasNewActive=(hydrated.events||[]).find(e=>e.status==='active'&&!(prev?.events||[]).find(pe=>pe.id===e.id&&pe.status==='active'));
        if(hasNewActive)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:hasNewActive.name});
        return hydrated;
      });
    });
  },[showToast]);

  useEffect(()=>{
    let mounted=true;
    (async()=>{
      const session=loadSession();
      if(!session?.code){if(mounted)setSessionReady(true);return;}
      const gsRaw=await fbLoad(session.code);
      const gs=gsRaw?hydrateTeamMembers(gsRaw):null;
      if(!mounted){return;}
      if(!gs){clearSession();setSessionReady(true);return;}
      if(session.isAdmin){
        setGameState(gs);setIsAdmin(true);setScreen('game');setTab('admin');subGame(session.code);setSessionReady(true);return;
      }
      const participant=(gs.participants||[]).find(p=>p.id===session.participantId&&p.active!==false);
      if(participant){
        setGameState(gs);setMyParticipantId(participant.id);setIsAdmin(false);setScreen('game');setTab('home');subGame(session.code);
      }else{
        clearSession();
      }
      setSessionReady(true);
    })();
    return()=>{mounted=false};
  },[subGame]);

  const handleCreateGame=useCallback(async(form,missions)=>{
    const gs=initGame(form,missions);
    await fbSave(gs.gameCode,gs);
    setGameState(gs);setMyParticipantId(null);setScreen('game');setIsAdmin(true);setTab('admin');
    saveSession({code:gs.gameCode,isAdmin:true});
    subGame(gs.gameCode);
    setTimeout(()=>setShowShare(true),100);
  },[subGame]);

  const handleJoinGame=useCallback(async(code,playerName,_unused,asAdmin=false)=>{
    const gsRaw=await fbLoad(code);
    const gs=gsRaw?hydrateTeamMembers(gsRaw):null;
    if(!gs)return false;
    if(asAdmin){setGameState(gs);setIsAdmin(true);setTab('admin');setScreen('game');saveSession({code,isAdmin:true});subGame(code);return true;}
    if(!canJoinGame(gs))return '現在は新規参加を受け付けていません';
    const dup=(gs.participants||[]).find(p=>p.active!==false&&p.name===playerName);
    if(dup)return '同じ名前の参加者がすでにいます';
    const activeJoined=(gs.participants||[]).filter(p=>p.active!==false&&p.status!=='pending').length;
    const status=activeJoined>=(gs.config?.playerLimit||0)?'pending':'joined';
    const participant=createParticipant(playerName,status);
    const updated=hydrateTeamMembers({...gs,participants:[...(gs.participants||[]),participant],auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:`${playerName} が ${status==='pending'?'承認待ち':'参加'} で登録`} ]});
    await fbSave(code,updated);
    setGameState(updated);setMyParticipantId(participant.id);setScreen('game');setIsAdmin(false);setTab('home');
    saveSession({code,participantId:participant.id,isAdmin:false});
    subGame(code);
    return true;
  },[subGame]);

  const save=useCallback(async(newGs)=>{
    const hydrated=hydrateTeamMembers(newGs);
    await fbSave(hydrated.gameCode,hydrated);
    setGameState(hydrated);
  },[]);

  const updateGame=useCallback(async(updater)=>{
    if(!gameState)return;
    const next=typeof updater==='function'?updater(gameState):updater;
    await save(next);
  },[gameState,save]);

  const currentParticipant=(gameState?.participants||[]).find(p=>p.id===myParticipantId&&p.active!==false)||null;
  const myTeamId=currentParticipant?.teamId||null;
  const myTeam=gameState?.teams.find(t=>t.id===myTeamId)||null;

  const handleArrive=useCallback(async(station,photo)=>{
    if(!myTeamId||!gameState||gameState.state!=='in_progress')return;
    const myTeam=gameState.teams.find(t=>t.id===myTeamId);
    if(!myTeam||(myTeam.stationReached||[]).includes(station.id)){showToast({type:'warn',emoji:'⚠️',title:'既に記録済みです',sub:station.name});return;}
    const newReached=[...(myTeam.stationReached||[]),station.id];
    const reachedSet=new Set(newReached);
    const isOnCard=(myTeam.stationCard||[]).some(c=>c.id===station.id);
    const t=nowTime();
    const log={type:'s',title:`${station.name}に到着`,sub:isOnCard?'ビンゴカードの駅！':'',time:t,photo:photo||null};
    const prevBingo=checkBingo(myTeam.stationCard,new Set(myTeam.stationReached||[]));
    const newBingo=checkBingo(myTeam.stationCard,reachedSet);
    let newLogs=[...(myTeam.logs||[]),log];
    showToast({type:'ok',emoji:'📍',title:`${station.name}に到着！`,sub:isOnCard?'ビンゴカードの駅！':''});
    if(newBingo.length>prevBingo.length){
      const diff=newBingo.length-prevBingo.length;
      setTimeout(()=>showToast({type:'bingo',emoji:'🎯',title:`BINGO! ${diff}列達成！`,sub:'スコアが上がりました！'}),500);
      newLogs=[...newLogs,{type:'bingo',title:`駅ビンゴ達成！ ${diff}列`,sub:'スコア更新',time:t}];
    }
    const updated=gameState.teams.map(t2=>t2.id===myTeamId?{...t2,stationReached:newReached,logs:newLogs,currentStation:station.id}:t2);
    await save({...gameState,teams:updated});setTab('bingo');
  },[myTeamId,gameState,showToast,save]);

  const handleMissionSubmit=useCallback(async(missionId,photo,note)=>{
    if(!myTeamId||!gameState||gameState.state!=='in_progress')return;
    const appr={id:'a'+Date.now(),teamId:myTeamId,missionId,photo,note,time:nowTime()};
    const updatedTeams=gameState.teams.map(t=>{if(t.id!==myTeamId)return t;return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[missionId]:'pending'}};});
    await save({...gameState,teams:updatedTeams,pendingApprovals:[...(gameState.pendingApprovals||[]),appr]});
    showToast({type:'ms',emoji:'📤',title:'申請しました！',sub:'運営の承認をお待ちください'});
  },[myTeamId,gameState,showToast,save]);

  const handleApprove=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==appr.teamId)return t;
      const subs={...(t.missionSubmissions||{}),[appr.missionId]:'approved'};
      const newReached=[...(t.missionReached||[]),appr.missionId];
      const prevBingo=checkBingo(t.missionCard,new Set(t.missionReached||[]));
      const newBingo=checkBingo(t.missionCard,new Set(newReached));
      let newLogs=[...(t.logs||[]),{type:'ms',title:'ミッション承認！',sub:(gameState.missions||DEFAULT_MISSIONS).find(m=>m.id===appr.missionId)?.text||'',time:nowTime()}];
      if(newBingo.length>prevBingo.length){const diff=newBingo.length-prevBingo.length;newLogs=[...newLogs,{type:'bingo',title:`ミッションBINGO！ ${diff}列`,sub:'スコア更新',time:nowTime()}];}
      return{...t,missionSubmissions:subs,missionReached:newReached,logs:newLogs};
    });
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'ok',emoji:'✅',title:'承認しました',sub:''});
  },[gameState,showToast,save]);

  const handleReject=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{if(t.id!==appr.teamId)return t;return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[appr.missionId]:'rejected'}};});
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'warn',emoji:'✗',title:'却下しました',sub:''});
  },[gameState,showToast,save]);

  const handleFireEvent=useCallback(async(evId,action='start')=>{
    const events=(gameState.events||[]).map(ev=>{if(ev.id!==evId)return ev;return action==='end'?{...ev,status:'done'}:{...ev,status:'active',triggeredAt:Date.now()};});
    if(action==='start'){const ev=(gameState.events||[]).find(e=>e.id===evId);if(ev)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:ev.name});}
    const target=(gameState.events||[]).find(e=>e.id===evId);
    const teams=(gameState.teams||[]).map(team=>({...team,logs:[...(team.logs||[]),target?{type:'ev',title:action==='end'?'イベント終了':'イベント発動',sub:target.name,time:nowTime()}:null].filter(Boolean)}));
    await save({...gameState,events,teams});
  },[gameState,showToast,save]);

  const handleAddEvent=useCallback(async(ev)=>{await save({...gameState,events:[...(gameState.events||[]),ev]});},[gameState,save]);
  const handleApproveParticipant=useCallback(async(participantId)=>{
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===participantId?{...p,status:'joined'}:p),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'参加申請を承認'}]}));
  },[updateGame]);
  const handleRejectParticipant=useCallback(async(participantId)=>{
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).filter(p=>p.id!==participantId),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'参加申請を拒否'}]}));
  },[updateGame]);
  const handleAssignParticipant=useCallback(async(participantId,teamId)=>{
    if(!gameState||!canEditTeams(gameState))return;
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===participantId?{...p,teamId,status:teamId?'assigned':'joined'}:p),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'チーム編成を更新'}]}));
  },[gameState,updateGame]);
  const handleRenameTeam=useCallback(async(teamId,name)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,name:name||t.name,logs:[...(t.logs||[]),{type:'st',title:'チーム名変更',sub:name||t.name,time:nowTime()}]}:t)}));
  },[updateGame]);
  const handleSetTeamColor=useCallback(async(teamId,color)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,color,logs:[...(t.logs||[]),{type:'st',title:'チームカラー変更',sub:color,time:nowTime()}]}:t)}));
  },[updateGame]);
  const handleChangeGameState=useCallback(async(nextState)=>{
    await updateGame(gs=>{
      if(nextState==='in_progress'&&!canStartGame(gs))return gs;
      const startedAt=nextState==='in_progress'&&!gs.startedAt?Date.now():gs.startedAt;
      return{...gs,state:nextState,startedAt,finishedAt:nextState==='finished'?isoNow():gs.finishedAt,auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'state',time:nowTime(),message:`大会状態を ${nextState} に変更`} ]};
    });
    if(nextState==='in_progress')setTab('bingo');
  },[updateGame]);
  const handleAutoAssign=useCallback(async()=>{if(!gameState||!canEditTeams(gameState))return;await updateGame(gs=>autoAssignParticipants(gs));},[gameState,updateGame]);
  const handleUpdateConfig=useCallback(async(partial)=>{
    await updateGame(gs=>{
      const config={...(gs.config||{}),...partial};
      const teams=syncTeamsToCount(gs.teams,config.teamCount,config,gs.missions);
      return hydrateTeamMembers({...gs,config,teams});
    });
  },[updateGame]);
  const handleAdjustScore=useCallback(async(teamId,delta)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,manualScoreDelta:(t.manualScoreDelta||0)+delta,logs:[...(t.logs||[]),{type:'st',title:'スコア手動修正',sub:`${delta>0?'+':''}${delta}pt`,time:nowTime()}]}:t),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'score',time:nowTime(),message:`スコア手動修正 ${delta>0?'+':''}${delta}pt`}]}));
  },[updateGame]);
  const handleRenameSelf=useCallback(async(name)=>{
    if(!currentParticipant||!name.trim())return;
    const trimmed=name.trim();
    const dup=(gameState?.participants||[]).find(p=>p.active!==false&&p.id!==currentParticipant.id&&p.name===trimmed);
    if(dup){showToast({type:'warn',emoji:'⚠️',title:'同じ名前は使えません',sub:''});return;}
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,name:trimmed,nameHistory:[...(p.nameHistory||[]),{name:trimmed,changedAt:isoNow()}]}:p),teams:(gs.teams||[]).map(t=>t.id===currentParticipant.teamId?{...t,logs:[...(t.logs||[]),{type:'st',title:'プレイヤー名変更',sub:`${currentParticipant.name} → ${trimmed}`,time:nowTime()}]}:t)}));
    showToast({type:'ok',emoji:'📝',title:'名前を変更しました',sub:trimmed});
  },[currentParticipant,gameState,showToast,updateGame]);
  const handleLeaveGame=useCallback(async()=>{
    if(!currentParticipant)return;
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,teamId:null,status:'joined',active:false}:p),teams:(gs.teams||[]).map(t=>t.id===currentParticipant.teamId?{...t,logs:[...(t.logs||[]),{type:'st',title:'プレイヤー離脱',sub:currentParticipant.name,time:nowTime()}]}:t)}));
    exitGameSession({setGameState,setMyParticipantId,setIsAdmin,setScreen,setTab,setShowShare});
  },[currentParticipant,updateGame]);
  const handleExitToStart=useCallback(()=>{
    exitGameSession({setGameState,setMyParticipantId,setIsAdmin,setScreen,setTab,setShowShare});
  },[]);

  // Timer
  const cfg=gameState?.config;
  const gameDur=gameState?.startAt&&gameState?.endAt?Math.max(1,new Date(gameState.endAt)-new Date(gameState.startAt)):(cfg?.gameDuration||8*60*60*1000);
  const remaining=gameState?.endAt?Math.max(0,new Date(gameState.endAt)-nowTs):0;
  const rH=Math.floor(remaining/3600000);
  const rM=Math.floor((remaining%3600000)/60000);
  const rS=Math.floor((remaining%60000)/1000);
  const timerStr=`${rH}:${String(rM).padStart(2,'0')}:${String(rS).padStart(2,'0')}`;
  const isEnding=remaining<30*60*1000;
  const score=myTeam?calcScore(myTeam,cfg):{total:0,stB:0,msB:0,masks:0};
  const activeEvents=(gameState?.events||[]).filter(e=>e.status==='active');
  const participantCounts=getParticipantCounts(gameState);
  const pCount=(gameState?.pendingApprovals||[]).length+participantCounts.pending.length;
  const mode=cfg?.mode||'basic';
  const progressRatio=gameDur?remaining/gameDur:1;
  const canViewOpponents=(gameState?.state==='finished')||progressRatio>=0.25;
  const showOpponentDetails=gameState?.state==='finished'||isAdmin;
  const canOpenPlayTabs=(myTeam&&gameState?.state==='in_progress'&&currentParticipant?.status==='assigned');
  let playerTabs;
  if(gameState?.state==='finished'){
    playerTabs=[{id:'home',icon:'🏠',label:'ホーム'},{id:'score',icon:'🏆',label:'スコア'},{id:'profile',icon:'👤',label:'参加者'}];
  }else if(canOpenPlayTabs){
    playerTabs=mode==='double'
      ?[{id:'home',icon:'🏠',label:'ホーム'},{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'mission',icon:'🎯',label:'ミッション'},{id:'score',icon:'🏆',label:'スコア'},{id:'profile',icon:'👤',label:'参加者'}]
      :[{id:'home',icon:'🏠',label:'ホーム'},{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'score',icon:'🏆',label:'スコア'},{id:'profile',icon:'👤',label:'参加者'}];
  }else{
    playerTabs=[{id:'home',icon:'🏠',label:'ホーム'},{id:'profile',icon:'👤',label:'参加者'}];
  }

  useEffect(()=>{
    if(showRule)return;
    if(isAdmin&&tab!=='admin')setTab('admin');
    if(!isAdmin&&tab==='admin')setTab('home');
  },[isAdmin,showRule,tab]);
  useEffect(()=>{
    if(isAdmin)return;
    if(!playerTabs.find(item=>item.id===tab))setTab('home');
  },[isAdmin,playerTabs,tab]);

  // スタート画面
  if(!sessionReady)return<div className="loading"><div className="spinner"></div><div style={{fontSize:12,color:'var(--muted)'}}>セッションを確認しています...</div></div>;
  if(screen==='start')return<>
    <Toast toasts={toasts}/>
    <StartScreen onOrganizer={()=>setScreen('organizer')} onPlayer={()=>setScreen('player')}/>
    <div style={{position:'fixed',bottom:16,right:16}}>
      <button className="btn ghost" style={{fontSize:10,color:'var(--muted)',padding:'4px 8px',margin:0,width:'auto'}} onClick={()=>setScreen('adminJoin')}>🔒 運営</button>
    </div>
  </>;

  if(screen==='organizer')return<>
    <Toast toasts={toasts}/>
    <OrganizerSetup onCreateGame={handleCreateGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='player')return<>
    <Toast toasts={toasts}/>
    <PlayerJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='adminJoin')return<>
    <Toast toasts={toasts}/>
    <AdminJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  if(showRule&&gameState)return<>
    <Toast toasts={toasts}/>
    <RuleScreen gameState={gameState} onClose={()=>setShowRule(false)} requireConfirm={false}/>
  </>;

  const waitingMessage=currentParticipant?.status==='pending'
    ?'主催者の承認待ちです。承認されるまでこの画面のままお待ちください。'
    :currentParticipant?.status==='joined'
      ?'チーム編成中です。主催者がチームを割り当てるまでお待ちください。'
      :'ホームを表示中です。';

  // ゲーム画面
  return<div className="wrap">
    <Toast toasts={toasts}/>
    {showShare&&<ShareModal gameCode={gameState.gameCode} config={cfg} onClose={()=>setShowShare(false)}/>}

    <div className="hdr">
      <div className="logo">METRO RUN</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {isAdmin&&<div style={{background:'var(--surface-sub)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowShare(true)}>
          <span>招待コード</span><span style={{fontSize:9,color:'var(--muted)'}}>📤</span>
        </div>}
        {myTeam&&<div style={{background:'var(--surface-sub)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5}}>
          <div className="dot" style={{background:myTeam.color}}></div>
          <span>{myTeam.name}</span>
        </div>}
        <button className="btn ghost" style={{fontSize:10,color:'var(--muted)',padding:'4px 8px',margin:0,width:'auto'}} onClick={()=>setShowRule(true)}>📘 ルール</button>
        {!isAdmin&&<div style={{textAlign:'right'}}>
          <div style={{fontSize:9,color:'var(--muted)'}}>残り</div>
          <div className={`timer ${isEnding?'end':''}`}>{timerStr}</div>
        </div>}
        {isAdmin&&<div style={{fontSize:11,color:'var(--red)',fontWeight:700,display:'flex',alignItems:'center',gap:5}}>
          ADMIN {pCount>0&&<span className="badge badge-pend">{pCount}</span>}
        </div>}
      </div>
    </div>

    {!isAdmin&&myTeam&&gameState?.state==='in_progress'&&<div className="sbar">
      <div className="si"><div className="sl">SCORE</div><div className="sv">{score.total}</div></div>
      {mode==='double'
        ?<><div className="si"><div className="sl">駅BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">ミッション</div><div className="sv p">{score.msB}</div></div></>
        :<><div className="si"><div className="sl">BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">マス</div><div className="sv g">{score.masks}</div></div></>}
    </div>}

    {!isAdmin&&activeEvents.map(ev=>(
      <div key={ev.id} className="evbanner active">
        <span style={{fontSize:20}}>🚨</span>
        <div><div style={{fontSize:11,color:'var(--red)',fontWeight:700}}>イベント発動中！</div>
          <div style={{fontSize:12,fontWeight:700}}>{ev.name}</div>
          {ev.reward&&<div style={{fontSize:10,color:'var(--orange)',marginTop:1}}>報酬：{ev.reward}</div>}
        </div>
      </div>
    ))}

    <div className="nav">
      {(isAdmin?[{id:'admin',icon:'🔒',label:'運営'}]:playerTabs).map(t=>(
        <button key={t.id} className={`nt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <span className="ni">{t.icon}</span>{t.label}
          {t.id==='admin'&&pCount>0&&<span className="badge badge-pend" style={{marginTop:1}}>{pCount}</span>}
        </button>
      ))}
    </div>

    <div className="cnt">
      {!isAdmin&&tab==='home'&&<div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14,marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{gameState.title}</div>
          <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>
            状態: {gameState.state}<br/>
            参加者: {currentParticipant?.name||'未参加'}<br/>
            {myTeam?`所属チーム: ${myTeam.name}`:'所属チーム: 未割り当て'}<br/>
            スタート駅: {gameState.startStationName||gameState.startStationId}
          </div>
        </div>
        {currentParticipant?.status!=='assigned'||gameState.state!=='in_progress'
          ?<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14}}>
            <div style={{fontWeight:700,marginBottom:6}}>{currentParticipant?.status==='pending'?'承認待ち':gameState.state==='finished'?'大会は終了しました':'待機中'}</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>{gameState.state==='finished'?'スコアタブからリザルトを確認できます。':waitingMessage}</div>
          </div>
          :<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14}}>
            <div style={{fontWeight:700,marginBottom:6}}>ゲーム進行中</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>
              終盤になると相手チームの情報は自動で非表示になります。現在は {canViewOpponents?'表示中':'非表示'} です。
            </div>
          </div>}
      </div>}
      {tab==='bingo'&&gameState&&myTeam&&<BingoPage gameState={gameState} myTeamId={myTeamId} config={cfg} canViewOpponents={canViewOpponents} showOpponentDetails={showOpponentDetails}/>}
      {tab==='arrival'&&myTeam&&gameState.state==='in_progress'&&<ArrivalPage team={myTeam} config={cfg} onArrive={handleArrive}/>}
      {tab==='mission'&&myTeam&&mode==='double'&&gameState.state==='in_progress'&&<MissionPage team={myTeam} onSubmitMission={handleMissionSubmit}/>}
      {tab==='score'&&gameState&&<ScorePage gameState={gameState} myTeamId={myTeamId} isFinished={gameState.state==='finished'}/>}
      {tab==='profile'&&!isAdmin&&currentParticipant&&<div>
        <p className="sec">参加者情報</p>
        <input className="sinp" value={currentParticipant.name} onChange={e=>setGameState(gs=>gs?{...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,name:e.target.value}:p)}:gs)}/>
        <button className="btn pri" onClick={()=>handleRenameSelf((gameState?.participants||[]).find(p=>p.id===currentParticipant.id)?.name||currentParticipant.name)}>名前を更新</button>
        <button className="btn red" onClick={handleLeaveGame}>大会から離脱する</button>
        <p className="sec">名前変更履歴</p>
        {(currentParticipant.nameHistory||[]).slice().reverse().map((item,i)=><div key={i} className="li">
          <div className="lic st">📝</div>
          <div className="lb"><div className="lt">{item.name}</div><div className="ls">{item.changedAt}</div></div>
        </div>)}
      </div>}
      {tab==='admin'&&gameState&&<AdminPage gameState={gameState} onFireEvent={handleFireEvent} onAddEvent={handleAddEvent} onApprove={handleApprove} onReject={handleReject} onApproveParticipant={handleApproveParticipant} onRejectParticipant={handleRejectParticipant} onAssignParticipant={handleAssignParticipant} onRenameTeam={handleRenameTeam} onSetTeamColor={handleSetTeamColor} onChangeGameState={handleChangeGameState} onAutoAssign={handleAutoAssign} onUpdateConfig={handleUpdateConfig} onAdjustScore={handleAdjustScore}/>}
      {isAdmin&&<div style={{marginTop:18}}>
        <button className="btn sec" onClick={handleExitToStart}>トップに戻る</button>
        {gameState?.state==='finished'&&<button className="btn pri" onClick={handleExitToStart}>新しい大会を作る</button>}
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
