<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東京メトロラン</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0e1a;color:#e8eaf0;min-height:100vh}
:root{
  --red:#e60012;--orange:#f68b1e;--yellow:#f5c518;--green:#00a650;
  --cyan:#00b2d6;--purple:#8f76d6;--card:#141824;--card2:#1a1f2e;
  --border:rgba(255,255,255,0.1);--muted:#8892a4;--gold:#f5c518
}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:#141824;border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  background:linear-gradient(90deg,#e60012,#f68b1e,#f5c518);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.timer{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1;text-align:right}
.timer.end{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* SCORE BAR */
.sbar{background:var(--card);padding:8px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border)}
.si{flex:1;background:var(--card2);border-radius:8px;padding:7px 8px;text-align:center;border:1px solid var(--border)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;color:var(--gold)}
.sv.b{color:var(--cyan)}.sv.g{color:var(--green)}.sv.p{color:var(--purple)}

/* NAV */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.nt{flex:0 0 auto;padding:9px 10px;text-align:center;font-size:9px;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Noto Sans JP',sans-serif;min-width:58px}
.nt.on{color:var(--yellow);border-bottom-color:var(--yellow)}
.ni{font-size:16px}
.cnt{flex:1;padding:14px;overflow-y:auto}
.sec{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:14px}

/* BINGO */
.btabs{display:flex;gap:6px;margin-bottom:10px}
.btab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);
  font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.btab.on.st{border-color:var(--cyan);color:var(--cyan);background:rgba(0,178,214,.08)}
.btab.on.ms{border-color:var(--purple);color:var(--purple);background:rgba(143,118,214,.08)}
.team-tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto}
.team-tab{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--card2);font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;color:var(--muted);white-space:nowrap}
.team-tab.on{border-color:var(--yellow);color:var(--yellow)}
.bgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:var(--border);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:2px}
.bcell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--card2);border-radius:4px;padding:2px;position:relative;overflow:hidden}
.bcell.hit{background:#1a3a1a;border:1px solid var(--green)}
.bcell.hit::after{content:'✓';position:absolute;top:1px;right:2px;font-size:7px;color:var(--green)}
.bcell.pend{background:#2a1a00;border:1px solid var(--orange)}
.bcell.free{background:#1a1a00;border:1px solid var(--yellow)}
.bcell.bline{background:#0d1f2d;border:1px solid var(--cyan)}
.bcell.bline.mb{background:#1a0d2d;border:1px solid var(--purple)}
.bcell.corner{box-shadow:inset 0 0 0 1px rgba(230,0,18,.3)}
.bln{font-size:7px;color:var(--muted);line-height:1;text-align:center}
.bcell.hit .bln{color:var(--green)}
.bnm{font-size:8px;font-weight:700;color:#e8eaf0;line-height:1.2;text-align:center;word-break:break-all}
.bcell.hit .bnm{color:#7fdd7f}
.bcell.free .bnm{color:var(--yellow);font-size:7px}
.bcell.bline .bnm{color:var(--cyan)}
.bcell.bline.mb .bnm{color:var(--purple)}
.bcell.pend .bnm{color:var(--orange)}

/* MULTIPLY */
.multiply-display{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;text-align:center}
.multiply-formula{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:2px}

/* SCORE DETAIL */
.score-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.score-row:last-child{border-bottom:none;font-weight:700;color:#e8eaf0;padding-top:8px;margin-top:4px}
.score-row .lbl{color:var(--muted)}
.score-row .val{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold)}
.score-row .val.neg{color:var(--red)}

/* MISSION */
.mission-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:11px;margin-bottom:7px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}
.mission-item.done{border-color:var(--green);background:rgba(0,166,80,.06)}
.mission-item.pend{border-color:var(--orange);background:rgba(246,139,30,.06)}
.mn{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);flex-shrink:0;width:22px;line-height:1}
.mission-item.done .mn{color:var(--green)}.mission-item.pend .mn{color:var(--orange)}
.mb2{flex:1}
.mt{font-size:11px;font-weight:700;line-height:1.5}
.me{font-size:10px;color:var(--muted);margin-top:2px}
.ms-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:2px}
.ms-none{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.ms-pend{background:rgba(246,139,30,.15);color:var(--orange)}
.ms-done{background:rgba(0,166,80,.15);color:var(--green)}
.ms-rej{background:rgba(230,0,18,.15);color:var(--red)}

/* PHOTO */
.photo-area{border:1.5px dashed var(--border);border-radius:10px;padding:14px;
  text-align:center;cursor:pointer;position:relative;overflow:hidden}
.photo-area.has{border-color:var(--green);border-style:solid}
.photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:block}
.photo-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* BTN */
.btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%;margin-top:8px}
.btn.pri{background:linear-gradient(135deg,var(--yellow),#c9a200);color:#000}
.btn.grn{background:linear-gradient(135deg,var(--green),#005c2e);color:#fff}
.btn.sec{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.btn.red{background:linear-gradient(135deg,var(--red),#8b0000);color:#fff}
.btn.ghost{background:none;color:var(--muted);border:none;font-size:13px;padding:8px}
.btn:active{transform:scale(.98)}

/* ARRIVAL */
.lsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.lbtn{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid transparent;font-family:'Noto Sans JP',sans-serif}
.sinp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:#e8eaf0;font-size:13px;font-family:'Noto Sans JP',sans-serif;
  margin-bottom:8px;outline:none}
.sinp:focus{border-color:rgba(255,255,255,.3)}
.sinp::placeholder{color:var(--muted)}
.sinp.sm{padding:7px 10px;font-size:12px;margin-bottom:6px}
.slist{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;max-height:200px;overflow-y:auto}
.sbtn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;
  text-align:left;cursor:pointer;display:flex;align-items:center;gap:6px;
  color:#e8eaf0;font-size:11px;font-family:'Noto Sans JP',sans-serif}
.sbtn.oncard{border-color:rgba(0,178,214,.5);background:rgba(0,178,214,.06)}
.sbtn.done{opacity:.4}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* RANKING */
.rank{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.rh{padding:8px 14px;background:var(--card2);font-size:10px;color:var(--muted);letter-spacing:1px;border-bottom:1px solid var(--border)}
.rrow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px}
.rrow:last-child{border-bottom:none}
.rrow.me{background:rgba(245,197,24,.06);border-left:3px solid var(--yellow)}
.rn{font-family:'Bebas Neue',sans-serif;font-size:20px;width:24px;color:var(--muted);flex-shrink:0}
.rn.g{color:var(--gold)}.rn.s{color:#b0b8c8}.rn.b{color:var(--orange)}
.rt{flex:1}.rtn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px}
.rtd{font-size:10px;color:var(--muted);margin-top:2px}
.rs{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold)}

/* LOG */
.li{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.li:last-child{border-bottom:none}
.lic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;background:var(--card2);border:1px solid var(--border)}
.lic.s{border-color:var(--green)}.lic.bingo{border-color:var(--cyan)}
.lic.st{border-color:var(--yellow)}.lic.ev{border-color:var(--red)}.lic.ms{border-color:var(--purple)}
.lb{flex:1}.lt{font-size:12px;font-weight:700}.ls{font-size:10px;color:var(--muted);margin-top:1px}
.ltm{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);flex-shrink:0}

/* EVENT BANNER */
.evbanner{border-radius:10px;padding:10px 12px;margin:6px 14px;display:flex;align-items:center;gap:10px}
.evbanner.active{background:rgba(230,0,18,.12);border:1px solid var(--red)}

/* ADMIN */
.admin-tabs{display:flex;gap:6px;margin-bottom:12px}
.admin-tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--card2);
  font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.admin-tab.on{border-color:var(--red);color:var(--red);background:rgba(230,0,18,.08)}
.appr-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.appr-btns{display:flex;gap:6px;margin-top:8px}
.appr-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.appr-ok{background:rgba(0,166,80,.2);color:var(--green);border:1px solid rgba(0,166,80,.4)}
.appr-ng{background:rgba(230,0,18,.15);color:var(--red);border:1px solid rgba(230,0,18,.3)}

/* MODAL / OVERLAY */
.center-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;
  display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;
  width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}
.modal-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;line-height:1.6}
.modal-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:11px;color:#e8eaf0;font-size:15px;font-family:'Noto Sans JP',sans-serif;
  outline:none;text-align:center;letter-spacing:4px;margin-bottom:8px}
.modal-input.left{text-align:left;letter-spacing:normal;font-size:13px}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cswatch.sel{border-color:#fff;transform:scale(1.15)}
.code-display{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;margin-bottom:12px}
.code-big{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:10px;color:var(--yellow);line-height:1}

/* MODE CARD */
.mode-card{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;
  padding:12px 14px;cursor:pointer;margin-bottom:8px}
.mode-card.sel.basic{border-color:var(--cyan)}
.mode-card.sel.double{border-color:var(--purple)}
.mode-card-title{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.mode-card-desc{font-size:10px;color:var(--muted);line-height:1.6}
.route-row{display:flex;gap:6px;margin-bottom:10px}
.route-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);
  font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.route-btn.sel{border-color:var(--yellow);color:var(--yellow)}

/* SETUP STEPS */
.step-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.step-dot.active{background:var(--yellow);width:20px;border-radius:4px}
.step-dot.done{background:var(--green)}
.step-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px}

/* RULE SCREEN */
.rule-screen{position:fixed;inset:0;background:#0a0e1a;z-index:700;overflow-y:auto;display:flex;flex-direction:column}
.rule-hero{padding:32px 20px 20px;text-align:center}
.rule-hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;
  background:linear-gradient(90deg,#e60012,#f68b1e,#f5c518);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.rule-hero-sub{font-size:12px;color:var(--muted)}
.rule-body{flex:1;padding:0 16px 16px}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.rule-card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rule-card-body{font-size:12px;color:var(--muted);line-height:2}
.rule-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.rule-step-num{width:22px;height:22px;border-radius:50%;background:var(--yellow);color:#000;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rule-step-text{font-size:12px;color:var(--muted);line-height:1.7;padding-top:2px}
.rule-check{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.rule-check-icon{color:var(--yellow);font-size:12px;flex-shrink:0;padding-top:2px}
.rule-check-text{font-size:12px;color:var(--muted);line-height:1.7}
.rule-footer{padding:16px;position:sticky;bottom:0;background:linear-gradient(to top,#0a0e1a 80%,transparent)}

/* CUSTOM SETTINGS */
.custom-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.custom-row:last-child{border-bottom:none}
.custom-label{font-size:12px;color:var(--muted)}
.custom-value{font-size:13px;font-weight:700}
.num-input{display:flex;align-items:center;gap:8px}
.num-btn{width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--border);
  color:#e8eaf0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif}
.toggle-row{display:flex;align-items:center;gap:8px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border);cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:left .2s}
.toggle.on::after{left:19px}
.plan-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(246,139,30,.15);color:var(--orange);border:1px solid rgba(246,139,30,.3)}

/* TOAST */
.tcon{position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:7px;width:360px;max-width:92vw;pointer-events:none}
.toast{background:var(--card);border-radius:10px;padding:10px 14px;border:1px solid;
  animation:tin .3s ease-out;font-size:12px;display:flex;align-items:center;gap:9px}
.toast.ok{border-color:var(--green)}.toast.bingo{border-color:var(--cyan)}
.toast.warn{border-color:var(--orange)}.toast.ev{border-color:var(--red)}.toast.ms{border-color:var(--purple)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-pend{background:rgba(246,139,30,.15);color:var(--orange);border:1px solid rgba(246,139,30,.3)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:12px}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;gap:4px}
.chip.cyan{background:rgba(0,178,214,.12);color:var(--cyan);border:1px solid rgba(0,178,214,.25)}
.chip.purple{background:rgba(143,118,214,.12);color:var(--purple);border:1px solid rgba(143,118,214,.25)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

// ── FIREBASE ──
firebase.initializeApp({
  apiKey:"AIzaSyDTMKfcvsKPOvMrHcQmewhWe55ejATpQNY",
  authDomain:"tokyo-metro-run.firebaseapp.com",
  databaseURL:"https://tokyo-metro-run-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"tokyo-metro-run",
  storageBucket:"tokyo-metro-run.firebasestorage.app",
  messagingSenderId:"812833586042",
  appId:"1:812833586042:web:42e1fc7ed04bfd5d8634c3"
});
const _db=firebase.database();
function stripPhotos(s){
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map(l=>({...l,photo:l.photo?'__local__':null}))}));
  if(r.pendingApprovals)r.pendingApprovals=r.pendingApprovals.map(a=>({...a,photo:a.photo?'__local__':null}));
  return r;
}
function savePhotos(code,s){
  const p={};
  (s.teams||[]).forEach(t=>(t.logs||[]).forEach((l,i)=>{if(l.photo&&l.photo!=='__local__')p[`l_${t.id}_${i}`]=l.photo}));
  (s.pendingApprovals||[]).forEach(a=>{if(a.photo&&a.photo!=='__local__')p[`a_${a.id}`]=a.photo});
  try{localStorage.setItem(`ph_${code}`,JSON.stringify(p))}catch(e){}
}
function mergePhotos(code,s){
  let p={};try{p=JSON.parse(localStorage.getItem(`ph_${code}`)||'{}')}catch(e){}
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map((l,i)=>({...l,photo:l.photo==='__local__'?(p[`l_${t.id}_${i}`]||null):l.photo}))}));
  if(r.pendingApprovals)r.pendingApprovals=r.pendingApprovals.map(a=>({...a,photo:a.photo==='__local__'?(p[`a_${a.id}`]||null):a.photo}));
  return r;
}
async function fbSave(code,s){await _db.ref(`games_v6/${code}`).set(stripPhotos(s));savePhotos(code,s)}
async function fbLoad(code){const snap=await _db.ref(`games_v6/${code}`).get();if(!snap.exists())return null;return mergePhotos(code,snap.val())}
function fbSub(code,cb){const ref=_db.ref(`games_v6/${code}`);ref.on('value',snap=>{if(snap.exists())cb(mergePhotos(code,snap.val()))});return()=>ref.off('value')}

// ── HELPERS ──
function getPool(routeMode){return routeMode==='full'?[...ALL_STATIONS,...TOEI_STATIONS]:ALL_STATIONS}
function genStationCard(routeMode='metro'){
  const pool=getPool(routeMode);
  const fixed=pool.filter(s=>s.fixed);
  const diff3=pool.filter(s=>s.diff===3&&!s.fixed);
  const others=pool.filter(s=>s.diff!==3||s.fixed);
  const fixedCorner=[...fixed].sort(()=>Math.random()-.5).slice(0,2);
  const randCorner=[...diff3].sort(()=>Math.random()-.5).slice(0,2);
  const corners=[...fixedCorner,...randCorner].sort(()=>Math.random()-.5);
  const usedIds=new Set(corners.map(s=>s.id));
  const normal=[...pool].filter(s=>!usedIds.has(s.id)).sort(()=>Math.random()-.5).slice(0,20);
  const card=new Array(25).fill(null);
  card[12]={id:'FREE',name:'FREE',line:null,isFree:true};
  let ci=0,ni=0;
  for(let i=0;i<25;i++){
    if(i===12)continue;
    card[i]=CORNER_INDICES.includes(i)?corners[ci++]:normal[ni++];
  }
  return card;
}
function genMissionCard(missions){
  const pool=missions||DEFAULT_MISSIONS;
  const sh=[...pool].sort(()=>Math.random()-.5).slice(0,24);
  return [...Array(25)].map((_,i)=>i===12?{id:'FREE',name:'FREE',isFree:true}:sh[i-(i>12?1:0)]);
}
function checkBingo(card,reached){
  if(!card||!reached)return[];
  const lines=[];const ok=i=>card[i]&&(card[i].isFree||reached.has(card[i].id));
  for(let r=0;r<5;r++){const c=[0,1,2,3,4].map(x=>r*5+x);if(c.every(ok))lines.push(c)}
  for(let c=0;c<5;c++){const r=[0,1,2,3,4].map(x=>x*5+c);if(r.every(ok))lines.push(r)}
  if([0,6,12,18,24].every(ok))lines.push([0,6,12,18,24]);
  if([4,8,12,16,20].every(ok))lines.push([4,8,12,16,20]);
  return lines;
}
function calcScore(team,config){
  if(!team)return{stB:0,msB:0,masks:0,total:0};
  const stR=new Set(team.stationReached||[]);
  const msR=new Set(team.missionReached||[]);
  const stBingo=checkBingo(team.stationCard,stR);
  const msBingo=checkBingo(team.missionCard,msR);
  const stMasks=(team.stationReached||[]).filter(id=>id!=='FREE').length;
  const msMasks=(team.missionReached||[]).filter(id=>id!=='FREE').length;
  const mode=config?.mode||'basic';
  const gp=team.goalPenalty||0;
  if(mode==='basic'){return{stB:stBingo.length,msB:0,masks:stMasks,total:stMasks+stBingo.length*3+gp}}
  const total=(stBingo.length+1)*(msBingo.length+1)+gp;
  return{stB:stBingo.length,msB:msBingo.length,masks:stMasks+msMasks,total};
}
function genCode(){return Math.random().toString(36).substr(2,6).toUpperCase()}
function nowTime(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
function initGame(teamName,teamColor,cfg,missions){
  const code=genCode();
  return{
    gameCode:code,version:'v6',
    config:{mode:cfg.mode,routeMode:cfg.routeMode,gameDuration:cfg.gameDuration||8*60*60*1000,
      goalEnabled:cfg.goalEnabled||false,goalAmount:cfg.goalAmount||-5,
      teamCount:cfg.teamCount||2,teamSize:cfg.teamSize||3,version:'v6'},
    missions:missions||DEFAULT_MISSIONS,
    teams:[{id:'t1',name:teamName,color:teamColor,
      stationCard:genStationCard(cfg.routeMode),
      missionCard:cfg.mode==='double'?genMissionCard(missions):null,
      stationReached:['FREE'],missionReached:['FREE'],
      missionSubmissions:{},goalPenalty:0,
      logs:[{type:'st',title:'ゲーム開始！',sub:'大手町駅からスタート',time:nowTime()}]}],
    events:[],startedAt:Date.now(),pendingApprovals:[],
  };
}

// ── BINGO PAGE ──
function BingoPage({gameState,myTeamId,config}){
  const mode=config?.mode||'basic';
  const [bingoView,setBingoView]=useState('station');
  const [viewTeamId,setViewTeamId]=useState(myTeamId);
  const teams=gameState.teams||[];
  const viewTeam=teams.find(t=>t.id===viewTeamId)||teams[0];
  const isMyTeam=viewTeamId===myTeamId;
  const stR=useMemo(()=>new Set(viewTeam?.stationReached||[]),[viewTeam?.stationReached]);
  const msR=useMemo(()=>new Set(viewTeam?.missionReached||[]),[viewTeam?.missionReached]);
  const stB=useMemo(()=>checkBingo(viewTeam?.stationCard,stR),[viewTeam?.stationCard,stR]);
  const msB=useMemo(()=>checkBingo(viewTeam?.missionCard,msR),[viewTeam?.missionCard,msR]);
  const stBS=new Set(stB.flat());const msBS=new Set(msB.flat());
  const myTeam=teams.find(t=>t.id===myTeamId);
  const myScore=calcScore(myTeam,config);

  return<div>
    {/* チーム切り替え */}
    {teams.length>1&&<div className="team-tabs">
      {teams.map(t=>(
        <button key={t.id} className={`team-tab ${viewTeamId===t.id?'on':''}`}
          style={viewTeamId===t.id?{borderColor:t.color,color:t.color}:{}}
          onClick={()=>setViewTeamId(t.id)}>
          {t.id===myTeamId?'自チーム':t.name}
          {t.id!==myTeamId&&<span style={{fontSize:8,marginLeft:4,opacity:.6}}>👁</span>}
        </button>
      ))}
    </div>}

    {!isMyTeam&&<div style={{background:'rgba(143,118,214,.1)',border:'1px solid var(--purple)',borderRadius:8,padding:'7px 12px',marginBottom:10,fontSize:11,color:'var(--purple)'}}>
      👁 {viewTeam?.name} のビンゴを閲覧中
    </div>}

    {mode==='double'&&<div className="btabs">
      <button className={`btab st ${bingoView==='station'?'on':''}`} onClick={()=>setBingoView('station')}>🚇 駅名 ({stB.length}BINGO)</button>
      <button className={`btab ms ${bingoView==='mission'?'on':''}`} onClick={()=>setBingoView('mission')}>🎯 ミッション ({msB.length}BINGO)</button>
    </div>}

    {(bingoView==='station'||mode==='basic')&&viewTeam?.stationCard&&<div className="bgrid">
      {viewTeam.stationCard.map((cell,i)=>{
        const hit=cell.isFree||stR.has(cell.id);
        const bl=stBS.has(i)&&hit;
        const ln=cell.line?METRO_LINES[cell.line]:null;
        const isCorner=CORNER_INDICES.includes(i);
        return<div key={i} className={`bcell ${hit&&!cell.isFree?'hit':''} ${cell.isFree?'free':''} ${bl?'bline':''} ${isCorner&&!hit?'corner':''}`}>
          {ln&&<div className="bln" style={{color:ln.color}}>{ln.short}</div>}
          <div className="bnm">{cell.isFree?'FREE':cell.name}</div>
        </div>;
      })}
    </div>}

    {bingoView==='mission'&&mode==='double'&&viewTeam?.missionCard&&<div className="bgrid">
      {viewTeam.missionCard.map((cell,i)=>{
        const hit=cell.isFree||msR.has(cell.id);
        const pend=!hit&&(viewTeam.missionSubmissions||{})[cell.id]==='pending';
        const bl=msBS.has(i)&&hit;
        return<div key={i} className={`bcell ${hit&&!cell.isFree?'hit':''} ${cell.isFree?'free':''} ${pend?'pend':''} ${bl?'bline mb':''}`}>
          {!cell.isFree&&<div className="bln">{cell.icon||'🎯'}</div>}
          <div className="bnm" style={{fontSize:7}}>{cell.isFree?'FREE':(cell.text||'').slice(0,10)+'…'}</div>
        </div>;
      })}
    </div>}

    {/* スコアサマリー（自チームのみ） */}
    {isMyTeam&&<div style={{marginTop:12}}>
      {mode==='double'?
        <div className="multiply-display">
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>現在のスコア</div>
          <div className="multiply-formula">({myScore.stB}+1) × ({myScore.msB}+1) = {myScore.total}</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>両方バランスよく取るほど高得点！</div>
        </div>:
        <div className="score-detail">
          <div className="score-row"><span className="lbl">マス数</span><span className="val">{myScore.masks}pt</span></div>
          <div className="score-row"><span className="lbl">ビンゴ（{myScore.stB}列×3pt）</span><span className="val">{myScore.stB*3}pt</span></div>
          <div className="score-row"><span>合計</span><span className="val" style={{fontSize:20}}>{myScore.total}pt</span></div>
        </div>}
    </div>}
  </div>;
}

// ── ARRIVAL PAGE ──
function ArrivalPage({team,config,onArrive}){
  const [selLine,setSelLine]=useState(null);
  const [search,setSearch]=useState('');
  const [sel,setSel]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const fileRef=useRef();
  const reached=new Set(team.stationReached||[]);
  const cardIds=new Set((team.stationCard||[]).map(c=>c.id));
  const pool=useMemo(()=>getPool(config?.routeMode||'metro'),[config?.routeMode]);
  const filtered=useMemo(()=>{
    let s=pool;
    if(selLine)s=s.filter(x=>x.line===selLine);
    if(search)s=s.filter(x=>x.name.includes(search));
    return s;
  },[pool,selLine,search]);
  const linesInPool=[...new Set(pool.map(s=>s.line))];
  const lastId=(team.stationReached||[]).filter(id=>id!=='FREE').slice(-1)[0];
  return<div>
    {lastId&&<div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:10}}>
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:3}}>現在地（最終記録）</div>
      <div style={{fontSize:20,fontWeight:700}}>{pool.find(s=>s.id===lastId)?.name||lastId}</div>
    </div>}
    <div className="lsel">
      <button className="lbtn" style={{background:!selLine?'rgba(255,255,255,.15)':'var(--card2)',color:'#e8eaf0',borderColor:!selLine?'rgba(255,255,255,.4)':'var(--border)',opacity:!selLine?1:.6}} onClick={()=>setSelLine(null)}>全線</button>
      {linesInPool.map(k=>{const l=METRO_LINES[k];if(!l)return null;return(
        <button key={k} className="lbtn" style={{background:l.color+(selLine===k?'cc':'33'),color:selLine===k?'#fff':l.color,borderColor:l.color,opacity:selLine&&selLine!==k?.5:1}} onClick={()=>setSelLine(selLine===k?null:k)}>{l.name}</button>
      );})}
    </div>
    <input className="sinp" placeholder="駅名で検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <div className="slist">
      {filtered.map(st=>{
        const ln=METRO_LINES[st.line];if(!ln)return null;
        const visited=reached.has(st.id);const onCard=cardIds.has(st.id);const isSel=sel?.id===st.id;
        return<button key={st.id} className={`sbtn ${onCard?'oncard':''} ${visited?'done':''}`}
          style={isSel?{borderColor:'var(--yellow)',background:'rgba(245,197,24,.1)'}:{}}
          onClick={()=>setSel(isSel?null:st)}>
          <div className="dot" style={{background:ln.color}}></div>
          <span>{st.name}</span>
          {onCard&&!visited&&<span style={{fontSize:8,color:'var(--cyan)',marginLeft:'auto'}}>★</span>}
          {visited&&<span style={{fontSize:8,color:'var(--green)',marginLeft:'auto'}}>✓</span>}
        </button>;
      })}
    </div>
    {sel&&<>
      <p className="sec" style={{marginTop:12}}>到着証拠写真（駅名看板を写してください）</p>
      <div className={`photo-area ${photoPreview?'has':''}`} onClick={()=>fileRef.current.click()}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" className="photo-input" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhotoPreview(ev.target.result);r.readAsDataURL(f);}}/>
        {photoPreview?<><img src={photoPreview} className="photo-preview" alt="証拠"/><div style={{fontSize:10,color:'var(--green)',marginTop:5}}>✓ 写真添付済み</div></>:<><div style={{fontSize:26,marginBottom:5}}>📷</div><div style={{fontSize:11,color:'var(--muted)'}}>駅名看板の写真を添付（推奨）</div></>}
      </div>
    </>}
    <button className={`btn ${sel?'grn':'sec'}`} style={{marginTop:10}} onClick={()=>{if(!sel)return;onArrive(sel,photoPreview);setSel(null);setPhotoPreview(null);setSearch('');}} disabled={!sel}>
      {sel?`📍 ${sel.name}に到着！`:'駅を選んでください'}
    </button>
  </div>;
}

// ── MISSION PAGE ──
function MissionPage({team,onSubmitMission}){
  const [sel,setSel]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [note,setNote]=useState('');
  const fileRef=useRef();
  const msR=new Set(team.missionReached||[]);
  const subs=team.missionSubmissions||{};
  const cardMissions=(team.missionCard||[]).filter(c=>!c.isFree);
  if(sel)return<div>
    <button onClick={()=>{setSel(null);setPhoto(null);setNote('');}} className="btn ghost" style={{marginTop:0,marginBottom:8,textAlign:'left'}}>← 一覧に戻る</button>
    <div style={{background:'var(--card2)',borderRadius:10,padding:12,marginBottom:12}}>
      <div style={{fontSize:22,marginBottom:6}}>{sel.icon}</div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{sel.text}</div>
      <div style={{fontSize:11,color:'var(--muted)'}}>📋 証拠：{sel.evidence}</div>
    </div>
    <p className="sec">証拠写真（必須）</p>
    <div className={`photo-area ${photo?'has':''}`} onClick={()=>fileRef.current.click()}>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" className="photo-input" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);}}/>
      {photo?<><img src={photo} className="photo-preview" alt="証拠"/><div style={{fontSize:10,color:'var(--green)',marginTop:5}}>✓ 写真添付済み</div></>:<><div style={{fontSize:26,marginBottom:5}}>📷</div><div style={{fontSize:11,color:'var(--muted)'}}>証拠写真を撮影または選択</div></>}
    </div>
    <input className="sinp" style={{marginTop:10}} placeholder="補足メモ（任意）" value={note} onChange={e=>setNote(e.target.value)}/>
    <button className={`btn ${photo?'pri':'sec'}`} onClick={()=>{if(!photo)return;onSubmitMission(sel.id,photo,note);setSel(null);setPhoto(null);setNote('');}} disabled={!photo}>
      {photo?'📤 運営に申請する':'写真を添付してください'}
    </button>
  </div>;
  return<div>
    <div style={{background:'rgba(143,118,214,.1)',border:'1px solid var(--purple)',borderRadius:10,padding:'9px 12px',marginBottom:12,fontSize:11}}>
      <span style={{fontWeight:700,color:'var(--purple)'}}>🎯 ミッションビンゴ</span>　写真を撮って申請 → 運営が承認するとマスが開きます
    </div>
    {cardMissions.map((m,idx)=>{
      const done=msR.has(m.id);const pend=subs[m.id]==='pending';const rej=subs[m.id]==='rejected';
      return<div key={m.id} className={`mission-item ${done?'done':''} ${pend?'pend':''}`} onClick={()=>!done&&!pend&&setSel(m)}>
        <div className="mn">{idx+1}</div>
        <div className="mb2">
          <div className="mt">{m.icon} {m.text}</div>
          <div className="me">📋 {m.evidence}</div>
          {rej&&<div style={{fontSize:10,color:'var(--red)',marginTop:3}}>✗ 却下。再申請できます</div>}
        </div>
        <div className={`ms-badge ${done?'ms-done':pend?'ms-pend':rej?'ms-rej':'ms-none'}`}>
          {done?'承認済':pend?'審査中':rej?'却下':'未達成'}
        </div>
      </div>;
    })}
  </div>;
}

// ── SCORE PAGE ──

  return<div>
    <div className="rank">
      <div className="rh">RANKING</div>
      {teams.map((t,i)=>(
        <div key={t.id} className={`rrow ${t.id===myTeamId?'me':''}`}>

          <div className="rt">
            <div className="rtn"><div className="dot" style={{background:t.color,width:9,height:9}}></div>{t.name}{t.id===myTeamId?' 👈':''}</div>
            <div className="rtd">{mode==='double'?`駅${t.stB}列・ミッション${t.msB}列`:`${t.masks}マス・BINGO${t.stB}列`}</div>

        <div className="multiply-formula">({myTeam.stB}+1)×({myTeam.msB}+1)={myTeam.total}</div>
      </div>:<div className="score-detail">
        <div className="score-row"><span className="lbl">マス（{myTeam.masks}×1pt）</span><span className="val">{myTeam.masks}pt</span></div>
        <div className="score-row"><span className="lbl">ビンゴ（{myTeam.stB}列×3pt）</span><span className="val">{myTeam.stB*3}pt</span></div>
        <div className="score-row"><span>合計</span><span className="val" style={{fontSize:22}}>{myTeam.total}pt</span></div>
      </div>}

        <div key={i} className="li">
          <div className={`lic ${log.type}`}>{log.type==='s'?'📍':log.type==='bingo'?'🎯':log.type==='ms'?'🏅':log.type==='ev'?'⚡':'🚀'}</div>
          <div className="lb"><div className="lt">{log.title}</div><div className="ls">{log.sub}</div>
            {log.photo&&<img src={log.photo} style={{width:'100%',maxHeight:70,objectFit:'cover',borderRadius:5,marginTop:5}} alt=""/>}
          </div>
          <div className="ltm">{log.time}</div>
        </div>
      ))}</div>
    </>}
  </div>;
}

        {newEv.type==='time'&&<input className="sinp sm" type="time" value={newEv.scheduledTime} onChange={e=>setNewEv({...newEv,scheduledTime:e.target.value})}/>}
        <button className="btn red" style={{marginTop:4}} onClick={()=>{if(!newEv.name)return;onAddEvent({...newEv,id:'e'+Date.now(),status:'pending',triggeredAt:null});setNewEv({name:'',desc:'',type:'manual',scheduledTime:'',reward:''});}}>＋ 追加</button>
      </div>
    </>}
    {tab==='scores'&&(gameState.teams||[]).map(t=>{
      const sc=calcScore(t,config);
      return<div key={t.id} style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:8}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
          <div className="dot" style={{background:t.color,width:10,height:10}}></div>
          <div style={{fontWeight:700,fontSize:14}}>{t.name}</div>
          <div style={{marginLeft:'auto',fontFamily:'Bebas Neue',fontSize:22,color:'var(--gold)'}}>{sc.total}pt</div>
        </div>
        <div style={{fontSize:10,color:'var(--muted)'}}>
          {config?.mode==='double'?`(${sc.stB}+1)×(${sc.msB}+1)=${sc.total}pt`:`マス${sc.masks} BINGO${sc.stB}列 計${sc.total}pt`}
        </div>
      </div>;
    })}

}

// ── ORGANIZER SETUP ──
function OrganizerSetup({onCreateGame,onBack}){
  const [step,setStep]=useState(0); // 0:mode 1:customize 2:missions 3:events
  const [gameMode,setGameMode]=useState('double');
  const [routeMode,setRouteMode]=useState('metro');
  const [hours,setHours]=useState(8);
  const [teamCount,setTeamCount]=useState(2);
  const [teamSize,setTeamSize]=useState(3);
  const [goalEnabled,setGoalEnabled]=useState(false);
  const [missions,setMissions]=useState(DEFAULT_MISSIONS.map(m=>({...m,enabled:true})));
  const [customMission,setCustomMission]=useState('');
  const [events,setEvents]=useState([
    {id:'e1',name:'ライブ会場キャパ対決',desc:'午前中に最大収容人数のライブ会場を発見！13:00に合流して発表',type:'time',scheduledTime:'13:00',reward:'任意1マス',status:'pending',triggeredAt:null},
  ]);
  const [newEv,setNewEv]=useState({name:'',scheduledTime:'',reward:'',type:'time'});
  const [teamName,setTeamName]=useState('');
  const [teamColor,setTeamColor]=useState(TEAM_COLORS[0]);
  const [loading,setLoading]=useState(false);

  const steps=['モード','カスタマイズ','ミッション','チーム'];
  const enabledMissions=missions.filter(m=>m.enabled);

  const handleCreate=async()=>{
    if(!teamName.trim())return;
    setLoading(true);
    const cfg={mode:gameMode,routeMode,gameDuration:hours*60*60*1000,
      teamCount,teamSize,goalEnabled,goalAmount:goalEnabled?-5:0};
    await onCreateGame(teamName.trim(),teamColor,cfg,enabledMissions,events);
    setLoading(false);
  };

  return<div className="center-overlay" style={{alignItems:'flex-start',paddingTop:20}}>
    <div className="modal">

        {steps.map((s,i)=><div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`}/>)}

        <div className="modal-title">ゲームモードを選ぶ</div>

          <div className="mode-card-title">🎯 ダブルビンゴ {gameMode==='double'&&<span style={{fontSize:10,color:'var(--purple)'}}>✓</span>}</div>

        </div>

        <div className="modal-title">ミッションを設定</div>

              <div style={{width:18,height:18,borderRadius:4,background:m.enabled?'var(--green)':'var(--card2)',border:`1px solid ${m.enabled?'var(--green)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                {m.enabled&&<span style={{fontSize:10,color:'white'}}>✓</span>}
              </div>
              <span style={{fontSize:11}}>{m.icon} {m.text}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <input className="sinp sm" placeholder="オリジナルミッションを追加..." value={customMission} onChange={e=>setCustomMission(e.target.value)} style={{flex:1,margin:0}}/>
          <button className="lbtn" style={{background:'var(--card2)',color:'#e8eaf0',border:'1px solid var(--border)',padding:'7px 12px',flexShrink:0}} onClick={()=>{if(!customMission.trim())return;const id='mc'+Date.now();setMissions(ms=>[...ms,{id,text:customMission.trim(),evidence:'写真',icon:'📌',enabled:true}]);setCustomMission('');}}>＋</button>
        </div>
        <button className="btn pri" onClick={()=>setStep(3)}>次へ →</button>
      </>}

      {/* STEP 3: チーム設定＋コード発行 */}
      {step===3&&<>
        <div className="modal-title">最初のチームを設定</div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:12,lineHeight:1.6}}>
          ゲームコードを発行します。他のチームはコードを入力して参加します。
        </div>
        <input className="modal-input left" placeholder="チーム名を入力..." value={teamName} onChange={e=>setTeamName(e.target.value)}/>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>チームカラー</div>
        <div className="color-row">{TEAM_COLORS.map(c=><div key={c} className={`cswatch ${teamColor===c?'sel':''}`} style={{background:c}} onClick={()=>setTeamColor(c)}></div>)}</div>
        {/* 設定サマリー */}
        <div style={{background:'var(--card2)',borderRadius:8,padding:'10px 12px',marginTop:4,marginBottom:4,fontSize:11,color:'var(--muted)',lineHeight:2}}>
          モード：{gameMode==='double'?'ダブルビンゴ':'ベーシック'} ／ 路線：{routeMode==='full'?'メトロ＋都営':'メトロのみ'}<br/>
          時間：{hours}時間 ／ チーム：{teamCount}チーム×{teamSize}人<br/>
          {gameMode==='double'&&`ミッション：${enabledMissions.length}個`}
        </div>
        <button className="btn pri" disabled={loading||!teamName.trim()} onClick={handleCreate}>
          {loading?'作成中...':'🚀 ゲームコードを発行する'}

  </div>;
}

// ── MAIN APP ──
function App(){
  const [screen,setScreen]=useState('start'); // start|organizer|player|admin|game
  const [gameState,setGameState]=useState(null);
  const [myTeamId,setMyTeamId]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [showRule,setShowRule]=useState(false);
  const [ruleConfirmed,setRuleConfirmed]=useState(false);
  const [tab,setTab]=useState('bingo');
  const [toasts,setToasts]=useState([]);
  const [showShare,setShowShare]=useState(false);
  const [nowTs,setNowTs]=useState(Date.now());
  const unsubRef=useRef(null);

  useEffect(()=>{
    const iv=setInterval(()=>{
      setNowTs(Date.now());
      // timed events
      setGameState(prev=>{
        if(!prev)return prev;
        const t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        let changed=false;
        const events=(prev.events||[]).map(ev=>{
          if(ev.type==='time'&&ev.status==='pending'&&ev.scheduledTime===t){changed=true;return{...ev,status:'active',triggeredAt:Date.now()}}
          return ev;
        });
        if(!changed)return prev;
        const gs={...prev,events};fbSave(gs.gameCode,gs);return gs;
      });
    },1000);
    return()=>clearInterval(iv);
  },[]);

  const showToast=useCallback((t)=>{
    const id=Date.now();
    setToasts(p=>[...p,{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const subGame=useCallback((code)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=fbSub(code,ns=>{
      setGameState(prev=>{
        const hasNewActive=(ns.events||[]).find(e=>e.status==='active'&&!(prev?.events||[]).find(pe=>pe.id===e.id&&pe.status==='active'));
        if(hasNewActive)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:hasNewActive.name});
        return ns;
      });
    });
  },[showToast]);

  const handleCreateGame=useCallback(async(teamName,teamColor,cfg,missions,events)=>{
    const gs=initGame(teamName,teamColor,cfg,missions);
    gs.events=events||[];
    await fbSave(gs.gameCode,gs);
    setGameState(gs);setMyTeamId('t1');setScreen('game');setIsAdmin(false);
    subGame(gs.gameCode);
    setShowRule(true); // 新規プレイヤーにルール表示
    setTimeout(()=>setShowShare(true),100);
  },[subGame]);

  const handleJoinGame=useCallback(async(code,teamName,teamColor,asAdmin=false)=>{
    const gs=await fbLoad(code);
    if(!gs)return false;
    if(asAdmin){setGameState(gs);setIsAdmin(true);setTab('admin');setScreen('game');subGame(code);return true;}
    const newId='t'+Date.now();
    const cfg=gs.config||{mode:'basic',routeMode:'metro'};
    const newTeam={id:newId,name:teamName,color:teamColor,
      stationCard:genStationCard(cfg.routeMode),
      missionCard:cfg.mode==='double'?genMissionCard(gs.missions):null,
      stationReached:['FREE'],missionReached:['FREE'],missionSubmissions:{},goalPenalty:0,
      logs:[{type:'st',title:'ゲーム参加！',sub:`チーム「${teamName}」で参加`,time:nowTime()}]};
    const updated={...gs,teams:[...gs.teams,newTeam]};
    await fbSave(code,updated);
    setGameState(updated);setMyTeamId(newId);setScreen('game');setIsAdmin(false);
    subGame(code);
    setShowRule(true); // ルール確認
    return true;
  },[subGame]);

  const save=useCallback(async(newGs)=>{await fbSave(newGs.gameCode,newGs);setGameState(newGs);},[]);

  const handleArrive=useCallback(async(station,photo)=>{
    if(!myTeamId||!gameState)return;
    const myTeam=gameState.teams.find(t=>t.id===myTeamId);
    if(!myTeam||(myTeam.stationReached||[]).includes(station.id)){showToast({type:'warn',emoji:'⚠️',title:'既に記録済みです',sub:station.name});return;}
    const newReached=[...(myTeam.stationReached||[]),station.id];
    const reachedSet=new Set(newReached);
    const isOnCard=(myTeam.stationCard||[]).some(c=>c.id===station.id);
    const t=nowTime();
    const log={type:'s',title:`${station.name}に到着`,sub:isOnCard?'ビンゴカードの駅！':'',time:t,photo:photo||null};
    const prevBingo=checkBingo(myTeam.stationCard,new Set(myTeam.stationReached||[]));
    const newBingo=checkBingo(myTeam.stationCard,reachedSet);
    let newLogs=[...(myTeam.logs||[]),log];
    showToast({type:'ok',emoji:'📍',title:`${station.name}に到着！`,sub:isOnCard?'ビンゴカードの駅！':''});
    if(newBingo.length>prevBingo.length){
      const diff=newBingo.length-prevBingo.length;
      setTimeout(()=>showToast({type:'bingo',emoji:'🎯',title:`BINGO! ${diff}列達成！`,sub:'スコアが上がりました！'}),500);
      newLogs=[...newLogs,{type:'bingo',title:`駅ビンゴ達成！ ${diff}列`,sub:'スコア更新',time:t}];
    }
    const updated=gameState.teams.map(t2=>t2.id===myTeamId?{...t2,stationReached:newReached,logs:newLogs,currentStation:station.id}:t2);
    await save({...gameState,teams:updated});setTab('bingo');
  },[myTeamId,gameState,showToast,save]);

  const handleMissionSubmit=useCallback(async(missionId,photo,note)=>{
    if(!myTeamId||!gameState)return;
    const appr={id:'a'+Date.now(),teamId:myTeamId,missionId,photo,note,time:nowTime()};
    const updatedTeams=gameState.teams.map(t=>{if(t.id!==myTeamId)return t;return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[missionId]:'pending'}};});
    await save({...gameState,teams:updatedTeams,pendingApprovals:[...(gameState.pendingApprovals||[]),appr]});
    showToast({type:'ms',emoji:'📤',title:'申請しました！',sub:'運営の承認をお待ちください'});
  },[myTeamId,gameState,showToast,save]);

  const handleApprove=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==appr.teamId)return t;
      const subs={...(t.missionSubmissions||{}),[appr.missionId]:'approved'};
      const newReached=[...(t.missionReached||[]),appr.missionId];
      const prevBingo=checkBingo(t.missionCard,new Set(t.missionReached||[]));
      const newBingo=checkBingo(t.missionCard,new Set(newReached));
      let newLogs=[...(t.logs||[]),{type:'ms',title:'ミッション承認！',sub:(gameState.missions||DEFAULT_MISSIONS).find(m=>m.id===appr.missionId)?.text||'',time:nowTime()}];
      if(newBingo.length>prevBingo.length){const diff=newBingo.length-prevBingo.length;newLogs=[...newLogs,{type:'bingo',title:`ミッションBINGO！ ${diff}列`,sub:'スコア更新',time:nowTime()}];}
      return{...t,missionSubmissions:subs,missionReached:newReached,logs:newLogs};
    });
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'ok',emoji:'✅',title:'承認しました',sub:''});
  },[gameState,showToast,save]);

  const handleReject=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{if(t.id!==appr.teamId)return t;return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[appr.missionId]:'rejected'}};});
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'warn',emoji:'✗',title:'却下しました',sub:''});
  },[gameState,showToast,save]);

  const handleFireEvent=useCallback(async(evId,action='start')=>{
    const events=(gameState.events||[]).map(ev=>{if(ev.id!==evId)return ev;return action==='end'?{...ev,status:'done'}:{...ev,status:'active',triggeredAt:Date.now()};});
    if(action==='start'){const ev=(gameState.events||[]).find(e=>e.id===evId);if(ev)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:ev.name});}
    await save({...gameState,events});
  },[gameState,showToast,save]);

  const handleAddEvent=useCallback(async(ev)=>{await save({...gameState,events:[...(gameState.events||[]),ev]});},[gameState,save]);

  // Timer
  const cfg=gameState?.config;
  const gameDur=cfg?.gameDuration||8*60*60*1000;
  const remaining=gameState?Math.max(0,gameDur-(nowTs-gameState.startedAt)):0;
  const rH=Math.floor(remaining/3600000);
  const rM=Math.floor((remaining%3600000)/60000);
  const rS=Math.floor((remaining%60000)/1000);
  const timerStr=`${rH}:${String(rM).padStart(2,'0')}:${String(rS).padStart(2,'0')}`;
  const isEnding=remaining<30*60*1000;
  const myTeam=gameState?.teams.find(t=>t.id===myTeamId);
  const score=myTeam?calcScore(myTeam,cfg):{total:0,stB:0,msB:0,masks:0};
  const activeEvents=(gameState?.events||[]).filter(e=>e.status==='active');
  const pCount=(gameState?.pendingApprovals||[]).length;
  const mode=cfg?.mode||'basic';

  const playerTabs=mode==='double'
    ?[{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'mission',icon:'🎯',label:'ミッション'},{id:'score',icon:'🏆',label:'スコア'}]
    :[{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'score',icon:'🏆',label:'スコア'}];

  // ルール確認画面
  if(screen==='game'&&!isAdmin&&showRule&&!ruleConfirmed){
    return<>
      <Toast toasts={toasts}/>
      <RuleScreen config={cfg} onStart={()=>{setRuleConfirmed(true);setShowRule(false);}}/>
    </>;
  }

  // スタート画面
  if(screen==='start')return<>
    <Toast toasts={toasts}/>
    <StartScreen onOrganizer={()=>setScreen('organizer')} onPlayer={()=>setScreen('player')}/>
    <div style={{position:'fixed',bottom:16,right:16}}>
      <button className="btn ghost" style={{fontSize:10,color:'var(--muted)',padding:'4px 8px',margin:0,width:'auto'}} onClick={()=>setScreen('adminJoin')}>🔒 運営</button>
    </div>
  </>;

  if(screen==='organizer')return<>
    <Toast toasts={toasts}/>
    <OrganizerSetup onCreateGame={handleCreateGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='player')return<>
    <Toast toasts={toasts}/>
    <PlayerJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='adminJoin')return<>
    <Toast toasts={toasts}/>
    <AdminJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  // ゲーム画面
  return<div className="wrap">
    <Toast toasts={toasts}/>
    {showShare&&<ShareModal gameCode={gameState.gameCode} config={cfg} onClose={()=>setShowShare(false)}/>}

    <div className="hdr">
      <div className="logo">METRO RUN</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {myTeam&&<div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowShare(true)}>
          <div className="dot" style={{background:myTeam.color}}></div>
          <span>{myTeam.name}</span>
          <span style={{fontSize:9,color:'var(--muted)'}}>📤</span>
        </div>}
        {!isAdmin&&<div style={{textAlign:'right'}}>
          <div style={{fontSize:9,color:'var(--muted)'}}>残り</div>
          <div className={`timer ${isEnding?'end':''}`}>{timerStr}</div>
        </div>}
        {isAdmin&&<div style={{fontSize:11,color:'var(--red)',fontWeight:700,display:'flex',alignItems:'center',gap:5}}>
          ADMIN {pCount>0&&<span className="badge badge-pend">{pCount}</span>}
        </div>}
      </div>
    </div>

    {!isAdmin&&<div className="sbar">
      <div className="si"><div className="sl">SCORE</div><div className="sv">{score.total}</div></div>
      {mode==='double'
        ?<><div className="si"><div className="sl">駅BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">ミッション</div><div className="sv p">{score.msB}</div></div></>
        :<><div className="si"><div className="sl">BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">マス</div><div className="sv g">{score.masks}</div></div></>}
    </div>}

    {!isAdmin&&activeEvents.map(ev=>(
      <div key={ev.id} className="evbanner active">
        <span style={{fontSize:20}}>🚨</span>
        <div><div style={{fontSize:11,color:'var(--red)',fontWeight:700}}>イベント発動中！</div>
          <div style={{fontSize:12,fontWeight:700}}>{ev.name}</div>
          {ev.reward&&<div style={{fontSize:10,color:'var(--orange)',marginTop:1}}>報酬：{ev.reward}</div>}
        </div>
      </div>
    ))}

    <div className="nav">
      {(isAdmin?[{id:'admin',icon:'🔒',label:'運営'}]:playerTabs).map(t=>(
        <button key={t.id} className={`nt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <span className="ni">{t.icon}</span>{t.label}
          {t.id==='admin'&&pCount>0&&<span className="badge badge-pend" style={{marginTop:1}}>{pCount}</span>}
        </button>
      ))}
    </div>

    <div className="cnt">
      {tab==='bingo'&&gameState&&<BingoPage gameState={gameState} myTeamId={myTeamId} config={cfg}/>}
      {tab==='arrival'&&myTeam&&<ArrivalPage team={myTeam} config={cfg} onArrive={handleArrive}/>}
      {tab==='mission'&&myTeam&&mode==='double'&&<MissionPage team={myTeam} onSubmitMission={handleMissionSubmit}/>}
      {tab==='score'&&gameState&&<ScorePage gameState={gameState} myTeamId={myTeamId}/>}
      {tab==='admin'&&gameState&&<AdminPage gameState={gameState} onFireEvent={handleFireEvent} onAddEvent={handleAddEvent} onApprove={handleApprove} onReject={handleReject}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
