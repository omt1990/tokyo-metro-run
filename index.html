<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東京メトロラン</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0e1a;color:#e8eaf0;min-height:100vh}
:root{
  --red:#e60012;--orange:#f68b1e;--yellow:#f5c518;--green:#00a650;
  --cyan:#00b2d6;--purple:#8f76d6;--bg:#0a0e1a;--card:#141824;
  --card2:#1a1f2e;--border:rgba(255,255,255,0.1);--muted:#8892a4;--gold:#f5c518;
  --diff1:#00b2d6;--diff2:#f5c518;--diff3:#e60012
}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#141824;border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  background:linear-gradient(90deg,#e60012,#f68b1e,#f5c518);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.timer{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1;text-align:right}
.timer.end{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.phase-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.phase-am{background:rgba(0,178,214,.15);color:var(--cyan);border:1px solid rgba(0,178,214,.3)}
.phase-lunch{background:rgba(230,0,18,.15);color:var(--red);border:1px solid rgba(230,0,18,.3)}
.phase-pm{background:rgba(245,197,24,.15);color:var(--yellow);border:1px solid rgba(245,197,24,.3)}
.sbar{background:var(--card);padding:8px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border)}
.si{flex:1;background:var(--card2);border-radius:8px;padding:7px 8px;text-align:center;border:1px solid var(--border)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;color:var(--gold)}
.sv.b{color:var(--cyan)}.sv.g{color:var(--green)}.sv.r{color:var(--red)}
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.nt{flex:0 0 auto;padding:9px 10px;text-align:center;font-size:9px;color:var(--muted);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Noto Sans JP',sans-serif;min-width:60px}
.nt.on{color:var(--yellow);border-bottom-color:var(--yellow)}
.ni{font-size:16px}
.cnt{flex:1;padding:14px;overflow-y:auto}
.sec{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:14px}
/* BINGO */
.btabs{display:flex;gap:6px;margin-bottom:12px}
.btab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);
  font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.btab.on.station{border-color:var(--cyan);color:var(--cyan);background:rgba(0,178,214,.08)}
.btab.on.mission{border-color:var(--purple);color:var(--purple);background:rgba(143,118,214,.08)}
.bgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:var(--border);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:2px}
.bcell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--card2);border-radius:4px;padding:2px;position:relative;overflow:hidden}
.bcell.hit{background:#1a3a1a;border:1px solid var(--green)}
.bcell.hit::after{content:'✓';position:absolute;top:1px;right:2px;font-size:7px;color:var(--green)}
.bcell.pend{background:#2a1a00;border:1px solid var(--orange)}
.bcell.free{background:#1a1a00;border:1px solid var(--yellow)}
.bcell.bline{background:#0d1f2d;border:1px solid var(--cyan)}
.bcell.bline.mb{background:#1a0d2d;border:1px solid var(--purple)}
/* 難易度マーカー */
.diff-badge{position:absolute;top:1px;left:2px;font-size:6px;font-weight:700;line-height:1}
.diff1{color:var(--diff1)}.diff2{color:var(--diff2)}.diff3{color:var(--diff3)}
.fixed-badge{position:absolute;bottom:1px;left:2px;font-size:5px;color:var(--orange)}
.bln{font-size:7px;color:var(--muted);line-height:1;text-align:center;margin-top:6px}
.bcell.hit .bln{color:var(--green)}
.bnm{font-size:8px;font-weight:700;color:#e8eaf0;line-height:1.2;text-align:center;word-break:break-all}
.bcell.hit .bnm{color:#7fdd7f}
.bcell.free .bnm{color:var(--yellow);font-size:7px}
.bcell.bline .bnm{color:var(--cyan)}
.bcell.bline.mb .bnm{color:var(--purple)}
.bcell.pend .bnm{color:var(--orange)}
/* SCORE */
.score-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.score-row:last-child{border-bottom:none;font-weight:700;color:#e8eaf0;margin-top:4px;padding-top:8px}
.score-row .label{color:var(--muted)}
.score-row .val{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold)}
.score-row .val.neg{color:var(--red)}
/* MULTIPLY DISPLAY */
.multiply-display{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;text-align:center}
.multiply-formula{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:2px}
.multiply-label{font-size:10px;color:var(--muted);margin-top:4px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.bottom-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.center-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}
.modal-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:11px;color:#e8eaf0;font-size:15px;font-family:'Noto Sans JP',sans-serif;
  outline:none;text-align:center;letter-spacing:4px;margin-bottom:8px}
.modal-input.left{text-align:left;letter-spacing:normal;font-size:13px}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15px}
.cswatch.sel{border-color:#fff;transform:scale(1.15)}
.code-display{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:12px}
.code-big{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:8px;color:var(--yellow);line-height:1}
/* MODE SELECT */
.mode-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.mode-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s}
.mode-card.sel.basic{border-color:var(--cyan);background:rgba(0,178,214,.08)}
.mode-card.sel.double{border-color:var(--purple);background:rgba(143,118,214,.08)}
.mode-card-title{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.mode-card-desc{font-size:11px;color:var(--muted);line-height:1.6}
.route-cards{display:flex;gap:6px;margin-bottom:12px}
.route-card{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s}
.route-card.sel{border-color:var(--yellow);background:rgba(245,197,24,.08)}
.route-card-title{font-size:12px;font-weight:700;margin-bottom:3px}
.route-card-desc{font-size:9px;color:var(--muted)}
/* MISSION */
.mission-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.mission-item.done{border-color:var(--green);background:rgba(0,166,80,.06)}
.mission-item.pend{border-color:var(--orange);background:rgba(246,139,30,.06)}
.mission-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);flex-shrink:0;width:24px;line-height:1}
.mission-item.done .mission-num{color:var(--green)}
.mission-item.pend .mission-num{color:var(--orange)}
.mission-body{flex:1}
.mission-title{font-size:12px;font-weight:700;line-height:1.5}
.mission-evidence{font-size:10px;color:var(--muted);margin-top:3px}
.mission-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:2px}
.ms-none{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.ms-pend{background:rgba(246,139,30,.15);color:var(--orange)}
.ms-done{background:rgba(0,166,80,.15);color:var(--green)}
.ms-rej{background:rgba(230,0,18,.15);color:var(--red)}
/* PHOTO */
.photo-area{border:1.5px dashed var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;position:relative;overflow:hidden}
.photo-area.has{border-color:var(--green);border-style:solid}
.photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:block}
.photo-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* BTN */
.btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;width:100%;margin-top:8px}
.btn.pri{background:linear-gradient(135deg,var(--yellow),#c9a200);color:#000}
.btn.grn{background:linear-gradient(135deg,var(--green),#005c2e);color:#fff}
.btn.sec{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.btn.red{background:linear-gradient(135deg,var(--red),#8b0000);color:#fff}
.btn:active{transform:scale(.98)}
/* ARRIVAL */
.lsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lbtn{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:'Noto Sans JP',sans-serif}
.sinp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:13px;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px;outline:none}
.sinp:focus{border-color:rgba(255,255,255,.3)}
.sinp::placeholder{color:var(--muted)}
.slist{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;max-height:200px;overflow-y:auto}
.sbtn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:6px;color:#e8eaf0;font-size:11px;font-family:'Noto Sans JP',sans-serif;position:relative}
.sbtn.oncard{border-color:rgba(0,178,214,.5);background:rgba(0,178,214,.06)}
.sbtn.done{opacity:.4}
.sbtn-diff{font-size:8px;font-weight:700;margin-left:auto;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* RANKING */
.rank{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.rh{padding:8px 14px;background:var(--card2);font-size:10px;color:var(--muted);letter-spacing:1px;border-bottom:1px solid var(--border)}
.rrow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px}
.rrow:last-child{border-bottom:none}
.rrow.me{background:rgba(245,197,24,.06);border-left:3px solid var(--yellow)}
.rn{font-family:'Bebas Neue',sans-serif;font-size:20px;width:24px;color:var(--muted);flex-shrink:0}
.rn.g{color:var(--gold)}.rn.s{color:#b0b8c8}.rn.b{color:var(--orange)}
.rt{flex:1}.rtn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px}
.rtd{font-size:10px;color:var(--muted);margin-top:2px}
.rs{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold)}
/* LOG */
.li{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.li:last-child{border-bottom:none}
.lic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--card2);border:1px solid var(--border)}
.lic.s{border-color:var(--green)}.lic.bingo{border-color:var(--cyan)}.lic.st{border-color:var(--yellow)}.lic.ev{border-color:var(--red)}.lic.ms{border-color:var(--purple)}
.lb{flex:1}.lt{font-size:12px;font-weight:700}.ls{font-size:10px;color:var(--muted);margin-top:1px}
.ltm{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);flex-shrink:0}
/* EVENT */
.evbanner{border-radius:10px;padding:10px 12px;margin:6px 14px;display:flex;align-items:center;gap:10px;animation:slideIn .4s ease-out}
.evbanner.active{background:rgba(230,0,18,.12);border:1px solid var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* RULES */
.rc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.rct{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.rcb{font-size:11px;color:var(--muted);line-height:1.9}
.stb{width:100%;font-size:11px;border-collapse:collapse}
.stb tr{border-bottom:1px solid var(--border)}
.stb tr:last-child{border-bottom:none}
.stb td{padding:5px 4px;color:var(--muted)}
.stb td:last-child{text-align:right;font-weight:700;font-family:'Bebas Neue',sans-serif;font-size:14px}
.stb .pos{color:var(--yellow)}.stb .neg{color:var(--red)}
/* ADMIN */
.admin-tabs{display:flex;gap:6px;margin-bottom:12px}
.admin-tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--card2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.admin-tab.on{border-color:var(--red);color:var(--red);background:rgba(230,0,18,.08)}
.approval-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.appr-btns{display:flex;gap:6px;margin-top:8px}
.appr-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.appr-ok{background:rgba(0,166,80,.2);color:var(--green);border:1px solid rgba(0,166,80,.4)}
.appr-ng{background:rgba(230,0,18,.15);color:var(--red);border:1px solid rgba(230,0,18,.3)}
/* TOAST */
.tcon{position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:7px;width:360px;max-width:92vw;pointer-events:none}
.toast{background:var(--card);border-radius:10px;padding:10px 14px;border:1px solid;animation:tin .3s ease-out;font-size:12px;display:flex;align-items:center;gap:9px}
.toast.ok{border-color:var(--green)}.toast.bingo{border-color:var(--cyan)}.toast.warn{border-color:var(--orange)}.toast.ev{border-color:var(--red)}.toast.ms{border-color:var(--purple)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-pend{background:rgba(246,139,30,.15);color:var(--orange);border:1px solid rgba(246,139,30,.3)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:12px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

// ── FIREBASE ──
firebase.initializeApp({
  apiKey:"AIzaSyDTMKfcvsKPOvMrHcQmewhWe55ejATpQNY",
  authDomain:"tokyo-metro-run.firebaseapp.com",
  databaseURL:"https://tokyo-metro-run-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"tokyo-metro-run",
  storageBucket:"tokyo-metro-run.firebasestorage.app",
  messagingSenderId:"812833586042",
  appId:"1:812833586042:web:42e1fc7ed04bfd5d8634c3"
});
const _db=firebase.database();
async function fbSave(code,state){
  const s=stripPhotos(state);
  await _db.ref(`games/${code}`).set(s);
  savePhotos(code,state);
}
async function fbLoad(code){
  const snap=await _db.ref(`games/${code}`).get();
  if(!snap.exists())return null;
  return mergePhotos(code,snap.val());
}
function fbSub(code,cb){
  const ref=_db.ref(`games/${code}`);
  ref.on('value',snap=>{if(snap.exists())cb(mergePhotos(code,snap.val()))});
  return()=>ref.off('value');
}
function stripPhotos(state){
  const s=JSON.parse(JSON.stringify(state));
  s.teams=(s.teams||[]).map(t=>({...t,logs:(t.logs||[]).map(l=>({...l,photo:l.photo?'__local__':null}))}));
  if(s.pendingApprovals)s.pendingApprovals=s.pendingApprovals.map(a=>({...a,photo:a.photo?'__local__':null}));
  return s;
}
function savePhotos(code,state){
  const p={};
  (state.teams||[]).forEach(t=>(t.logs||[]).forEach((l,i)=>{if(l.photo&&l.photo!=='__local__')p[`log_${t.id}_${i}`]=l.photo}));
  (state.pendingApprovals||[]).forEach(a=>{if(a.photo&&a.photo!=='__local__')p[`appr_${a.id}`]=a.photo});
  try{localStorage.setItem(`photos_${code}`,JSON.stringify(p))}catch(e){}
}
function mergePhotos(code,state){
  let p={};try{p=JSON.parse(localStorage.getItem(`photos_${code}`)||'{}')}catch(e){}
  const s=JSON.parse(JSON.stringify(state));
  s.teams=(s.teams||[]).map(t=>({...t,logs:(t.logs||[]).map((l,i)=>({...l,photo:l.photo==='__local__'?(p[`log_${t.id}_${i}`]||null):l.photo}))}));
  if(s.pendingApprovals)s.pendingApprovals=s.pendingApprovals.map(a=>({...a,photo:a.photo==='__local__'?(p[`appr_${a.id}`]||null):a.photo}));
  return s;
}

// ── CONSTANTS ──
const TEAM_COLORS=['#e60012','#f68b1e','#f5c518','#00a650','#00b2d6','#8f76d6','#e8508a','#009bbf'];

// 路線定義
const METRO_LINES={
  ginza:{name:'銀座線',color:'#f5a623',short:'G',op:'metro'},
  marunouchi:{name:'丸ノ内線',color:'#e60012',short:'M',op:'metro'},
  marunouchi_branch:{name:'丸ノ内線分岐',color:'#e60012',short:'Mb',op:'metro'},
  hibiya:{name:'日比谷線',color:'#9b9ea0',short:'H',op:'metro'},
  tozai:{name:'東西線',color:'#009bbf',short:'T',op:'metro'},
  chiyoda:{name:'千代田線',color:'#00bb85',short:'C',op:'metro'},

// ── BINGO GENERATION ──
function getStationPool(routeMode){
  const metro=ALL_STATIONS;
  if(routeMode==='full')return [...metro,...TOEI_STATIONS];
  return metro;
}

function genStationCard(routeMode='metro'){
  const pool=getStationPool(routeMode);
  const diff3=pool.filter(s=>s.diff===3);
  const diff2=pool.filter(s=>s.diff===2);
  const diff1=pool.filter(s=>s.diff===1);
  const fixed=pool.filter(s=>s.fixed);

  // 四隅に配置する駅を決定
  // 固定候補からランダム2つ選ぶ
  const shuffledFixed=[...fixed].sort(()=>Math.random()-.5);
  const fixedCorner=shuffledFixed.slice(0,2);
  // 残り2つの四隅は固定でないdiff3からランダム
  const nonFixedDiff3=diff3.filter(s=>!s.fixed).sort(()=>Math.random()-.5);
  const randomCorner=nonFixedDiff3.slice(0,2);
  const cornerStations=[...fixedCorner,...randomCorner].sort(()=>Math.random()-.5);

  // 通常マス（20マス）を埋める
  // 使用済みIDを除外
  const usedIds=new Set(cornerStations.map(s=>s.id));
  const remaining=[...diff3,...diff2,...diff1].filter(s=>!usedIds.has(s.id));
  const shuffledRemaining=remaining.sort(()=>Math.random()-.5);
  const normalStations=shuffledRemaining.slice(0,20);

  // カード配置
  const card=new Array(25).fill(null);
  card[12]={id:'FREE',name:'FREE',line:null,isFree:true,diff:0};
  let cornerIdx=0,normalIdx=0;
  for(let i=0;i<25;i++){
    if(i===12)continue;
    if(CORNER_INDICES.includes(i)){
      card[i]=cornerStations[cornerIdx++];
    } else {
      card[i]=normalStations[normalIdx++];
    }
  }
  return card;
}

function genMissionCard(){
  const sh=[...MISSIONS].sort(()=>Math.random()-.5).slice(0,24);
  return [...Array(25)].map((_,i)=>i===12?{id:'FREE',name:'FREE',isFree:true}:sh[i-(i>12?1:0)]);
}

function checkBingo(card,reached){
  if(!card||!reached)return[];
  const lines=[];
  const ok=i=>card[i]&&(card[i].isFree||reached.has(card[i].id));
  for(let r=0;r<5;r++){const c=[0,1,2,3,4].map(x=>r*5+x);if(c.every(ok))lines.push(c)}
  for(let c=0;c<5;c++){const r=[0,1,2,3,4].map(x=>x*5+c);if(r.every(ok))lines.push(r)}
  if([0,6,12,18,24].every(ok))lines.push([0,6,12,18,24]);
  if([4,8,12,16,20].every(ok))lines.push([4,8,12,16,20]);
  return lines;
}

function genCode(){return Math.random().toString(36).substr(2,6).toUpperCase()}
function nowTime(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}

// ── SCORE CALCULATION ──
function calcScore(team,config){
  if(!team)return{stationBingo:0,missionBingo:0,masks:0,total:0,formula:''};
  const stR=new Set(team.stationReached||[]);
  const msR=new Set(team.missionReached||[]);
  const stBingo=checkBingo(team.stationCard,stR);
  const msBingo=checkBingo(team.missionCard,msR);
  const stMasks=(team.stationReached||[]).filter(id=>id!=='FREE').length;
  const msMasks=(team.missionReached||[]).filter(id=>id!=='FREE').length;
  const mode=config?.mode||'basic';
  const goalPenalty=team.goalPenalty||0;

  if(mode==='basic'){
    // マス数 + ビンゴ列数×3
    const bingoScore=stBingo.length*3;
    const total=stMasks+bingoScore+goalPenalty;
    return{stationBingo:stBingo.length,missionBingo:0,masks:stMasks,total,
      formula:`${stMasks} + ${stBingo.length}×3 = ${total}`,goalPenalty};
  } else {
    // (駅ビンゴ列数+1) × (ミッションビンゴ列数+1)
    const total=(stBingo.length+1)*(msBingo.length+1)+goalPenalty;
    const masks=stMasks+msMasks;
    return{stationBingo:stBingo.length,missionBingo:msBingo.length,masks,total,
      formula:`(${stBingo.length}+1)×(${msBingo.length}+1)`,goalPenalty};
  }
}

// ── MAIN APP ──
function App(){
  const [gameState,setGameState]=useState(null);
  const [myTeamId,setMyTeamId]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [tab,setTab]=useState('bingo');
  const [toasts,setToasts]=useState([]);
  const [showShare,setShowShare]=useState(false);
  const [nowTs,setNowTs]=useState(Date.now());
  const unsubRef=useRef(null);

  useEffect(()=>{
    const interval=setInterval(()=>setNowTs(Date.now()),1000);
    return()=>clearInterval(interval);
  },[]);

  const showToast=useCallback((toast)=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{...toast,id}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3500);
  },[]);

  const subGame=useCallback((code)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=fbSub(code,newState=>{
      setGameState(prev=>{
        const hasNewActive=(newState.events||[]).find(e=>e.status==='active'&&!(prev?.events||[]).find(pe=>pe.id===e.id&&pe.status==='active'));
        if(hasNewActive)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:hasNewActive.name});
        return newState;
      });
    });
  },[showToast]);

  const handleCreate=useCallback(async(teamName,teamColor,modeConfig)=>{
    const gs=initGameState(teamName,teamColor,modeConfig);
    await fbSave(gs.gameCode,gs);
    setGameState(gs);setMyTeamId('t1');setTab('bingo');
    subGame(gs.gameCode);
    setTimeout(()=>setShowShare(true),300);
  },[subGame]);

  const handleJoin=useCallback(async(code,teamName,teamColor,asAdmin=false)=>{
    const gs=await fbLoad(code);
    if(!gs)return false;
    if(asAdmin){setGameState(gs);setIsAdmin(true);setTab('admin');subGame(code);return true;}
    const newId='t'+Date.now();
    const cfg=gs.config||{mode:'basic',routeMode:'metro'};
    const newTeam={
      id:newId,name:teamName,color:teamColor,
      stationCard:genStationCard(cfg.routeMode),
      missionCard:cfg.mode==='double'?genMissionCard():null,
      stationReached:['FREE'],missionReached:['FREE'],
      missionSubmissions:{},goalPenalty:0,
      logs:[{type:'st',title:'ゲーム参加！',sub:`チーム「${teamName}」で参加`,time:nowTime()}]
    };
    const updated={...gs,teams:[...gs.teams,newTeam]};
    await fbSave(code,updated);
    setGameState(updated);setMyTeamId(newId);setTab('bingo');subGame(code);
    return true;
  },[subGame]);

  const save=useCallback(async(newGs)=>{
    await fbSave(newGs.gameCode,newGs);
    setGameState(newGs);
  },[]);

  const handleArrive=useCallback(async(station,photoPreview)=>{
    if(!myTeamId||!gameState)return;
    const myTeam=gameState.teams.find(t=>t.id===myTeamId);
    if(!myTeam||(myTeam.stationReached||[]).includes(station.id)){
      showToast({type:'warn',emoji:'⚠️',title:'既に記録済みです',sub:station.name});return;
    }
    const newReached=[...(myTeam.stationReached||[]),station.id];
    const reachedSet=new Set(newReached);
    const isOnCard=(myTeam.stationCard||[]).some(c=>c.id===station.id);
    const t=nowTime();
    const log={type:'s',title:`${station.name}に到着`,sub:isOnCard?'ビンゴカードの駅！':'+1pt',time:t,photo:photoPreview||null};
    const prevBingo=checkBingo(myTeam.stationCard,new Set(myTeam.stationReached||[]));
    const newBingo=checkBingo(myTeam.stationCard,reachedSet);
    let newLogs=[...(myTeam.logs||[]),log];
    showToast({type:'ok',emoji:'📍',title:`${station.name}に到着！`,sub:isOnCard?'ビンゴカードの駅！':''});
    if(newBingo.length>prevBingo.length){
      const diff=newBingo.length-prevBingo.length;
      setTimeout(()=>showToast({type:'bingo',emoji:'🎯',title:`BINGO! ${diff}列達成！`,sub:'スコアが上がりました！'}),500);
      newLogs=[...newLogs,{type:'bingo',title:`駅ビンゴ達成！ ${diff}列`,sub:'スコア更新',time:t}];
    }
    const updated=gameState.teams.map(t2=>t2.id===myTeamId?{...t2,stationReached:newReached,logs:newLogs,currentStation:station.id}:t2);
    await save({...gameState,teams:updated});setTab('bingo');
  },[myTeamId,gameState,showToast,save]);

  const handleMissionSubmit=useCallback(async(missionId,photo,note)=>{
    if(!myTeamId||!gameState)return;
    const appr={id:'a'+Date.now(),teamId:myTeamId,missionId,photo,note,time:nowTime()};
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==myTeamId)return t;
      return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[missionId]:'pending'}};
    });
    await save({...gameState,teams:updatedTeams,pendingApprovals:[...(gameState.pendingApprovals||[]),appr]});
    showToast({type:'ms',emoji:'📤',title:'申請しました！',sub:'運営の承認をお待ちください'});
  },[myTeamId,gameState,showToast,save]);

  const handleApprove=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==appr.teamId)return t;
      const subs={...(t.missionSubmissions||{}),[appr.missionId]:'approved'};
      const newReached=[...(t.missionReached||[]),appr.missionId];
      const prevBingo=checkBingo(t.missionCard,new Set(t.missionReached||[]));
      const newBingo=checkBingo(t.missionCard,new Set(newReached));
      let newLogs=[...(t.logs||[]),{type:'ms',title:'ミッション承認！',sub:MISSIONS.find(m=>m.id===appr.missionId)?.text||'',time:nowTime()}];
      if(newBingo.length>prevBingo.length){
        const diff=newBingo.length-prevBingo.length;
        newLogs=[...newLogs,{type:'bingo',title:`ミッションBINGO！ ${diff}列`,sub:'スコア更新',time:nowTime()}];
      }
      return{...t,missionSubmissions:subs,missionReached:newReached,logs:newLogs};
    });
    const newPending=(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id);
    await save({...gameState,teams:updatedTeams,pendingApprovals:newPending});
    showToast({type:'ok',emoji:'✅',title:'承認しました',sub:''});
  },[gameState,showToast,save]);

  const handleReject=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==appr.teamId)return t;
      return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[appr.missionId]:'rejected'}};
    });
    const newPending=(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id);
    await save({...gameState,teams:updatedTeams,pendingApprovals:newPending});
    showToast({type:'warn',emoji:'✗',title:'却下しました',sub:''});
  },[gameState,showToast,save]);

  const handleFireEvent=useCallback(async(evId,action='start')=>{
    const events=(gameState.events||[]).map(ev=>{
      if(ev.id!==evId)return ev;
      return action==='end'?{...ev,status:'done'}:{...ev,status:'active',triggeredAt:Date.now()};
    });
    if(action==='start'){const ev=(gameState.events||[]).find(e=>e.id===evId);if(ev)showToast({type:'ev',emoji:'⚡',title:'イベント発動！',sub:ev.name});}
    await save({...gameState,events});
  },[gameState,showToast,save]);

  const handleAddEvent=useCallback(async(ev)=>{
    await save({...gameState,events:[...(gameState.events||[]),ev]});
  },[gameState,save]);

  const config=gameState?.config;
  const mode=config?.mode||'basic';
  const remaining=gameState?Math.max(0,gameState.gameDuration-(nowTs-gameState.startedAt)):0;
  const rH=Math.floor(remaining/3600000);
  const rM=Math.floor((remaining%3600000)/60000);
  const rS=Math.floor((remaining%60000)/1000);
  const timerStr=`${rH}:${String(rM).padStart(2,'0')}:${String(rS).padStart(2,'0')}`;
  const isEnding=remaining<30*60*1000;
  const myTeam=gameState?.teams.find(t=>t.id===myTeamId);
  const score=myTeam?calcScore(myTeam,config):{total:0,stationBingo:0,missionBingo:0,masks:0};
  const activeEvents=(gameState?.events||[]).filter(e=>e.status==='active');
  const pendingCount=(gameState?.pendingApprovals||[]).length;
  const phase=gameState?getPhase(gameState.startedAt):'am';
  const phaseLabel=phase==='am'?'午前フェーズ':phase==='lunch'?'昼休憩・対決':'午後フェーズ';
  const phaseCls=phase==='am'?'phase-am':phase==='lunch'?'phase-lunch':'phase-pm';

  const playerTabs=mode==='double'
    ?[{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'mission',icon:'🎯',label:'ミッション'},{id:'score',icon:'🏆',label:'スコア'},{id:'rules',icon:'📖',label:'ルール'}]
    :[{id:'bingo',icon:'🎰',label:'ビンゴ'},{id:'arrival',icon:'📍',label:'到着'},{id:'score',icon:'🏆',label:'スコア'},{id:'rules',icon:'📖',label:'ルール'}];

  if(!gameState||(!myTeamId&&!isAdmin)){
    return<><Toast toasts={toasts}/><SetupModal onCreate={handleCreate} onJoin={handleJoin}/></>;
  }

  return<div className="wrap">
    <Toast toasts={toasts}/>
    {showShare&&<ShareModal gameCode={gameState.gameCode} config={config} onClose={()=>setShowShare(false)}/>}
    <div className="hdr">
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        <div className="logo">METRO RUN</div>
        <span className={`phase-badge ${phaseCls}`}>{phaseLabel}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {myTeam&&<div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowShare(true)}>
          <div className="dot" style={{background:myTeam.color}}></div>
          <span>{myTeam.name}</span><span style={{fontSize:9,color:'var(--muted)'}}>📤</span>
        </div>}
        {!isAdmin&&<div>
          <div style={{fontSize:9,color:'var(--muted)',textAlign:'right'}}>残り</div>
          <div className={`timer ${isEnding?'end':''}`}>{timerStr}</div>
        </div>}
        {isAdmin&&<div style={{fontSize:11,color:'var(--red)',fontWeight:700,display:'flex',alignItems:'center',gap:5}}>
          ADMIN {pendingCount>0&&<span className="badge badge-pend">{pendingCount}</span>}
        </div>}
      </div>
    </div>

    {!isAdmin&&<div className="sbar">
      <div className="si"><div className="sl">SCORE</div><div className="sv">{score.total}</div></div>
      {mode==='double'
        ?<><div className="si"><div className="sl">駅BINGO</div><div className="sv b">{score.stationBingo}</div></div>
          <div className="si"><div className="sl">ミッション</div><div className="sv" style={{color:'var(--purple)'}}>{score.missionBingo}</div></div></>
        :<><div className="si"><div className="sl">BINGO</div><div className="sv b">{score.stationBingo}</div></div>
          <div className="si"><div className="sl">マス</div><div className="sv g">{score.masks}</div></div></>
      }
    </div>}

    {!isAdmin&&activeEvents.map(ev=>(
      <div key={ev.id} className="evbanner active">
        <span style={{fontSize:20}}>🚨</span>
        <div><div style={{fontSize:11,color:'var(--red)',fontWeight:700}}>イベント発動中！</div>
          <div style={{fontSize:12,fontWeight:700}}>{ev.name}</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>{ev.desc}</div>
          {ev.reward&&<div style={{fontSize:10,color:'var(--orange)',marginTop:1}}>報酬：{ev.reward}</div>}
        </div>
      </div>
    ))}

    <div className="nav">
      {(isAdmin?[{id:'admin',icon:'🔒',label:'運営'}]:playerTabs).map(t=>(
        <button key={t.id} className={`nt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <span className="ni">{t.icon}</span>{t.label}
          {t.id==='admin'&&pendingCount>0&&<span className="badge badge-pend" style={{marginTop:1}}>{pendingCount}</span>}
        </button>
      ))}
    </div>

    <div className="cnt">
      {tab==='bingo'&&myTeam&&<BingoPage team={myTeam} config={config}/>}
      {tab==='arrival'&&myTeam&&<ArrivalPage team={myTeam} config={config} onArrive={handleArrive}/>}
      {tab==='mission'&&myTeam&&mode==='double'&&<MissionPage team={myTeam} onSubmitMission={handleMissionSubmit}/>}
      {tab==='score'&&<ScorePage gameState={gameState} myTeamId={myTeamId}/>}
      {tab==='rules'&&<RulesPage config={config}/>}
      {tab==='admin'&&<AdminPage gameState={gameState} onFireEvent={handleFireEvent} onAddEvent={handleAddEvent} onApprove={handleApprove} onReject={handleReject} gameCode={gameState.gameCode}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
