<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東京メトロラン</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Barlow+Condensed:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f8f5;color:#141413;min-height:100vh}
:root{
  --red:#e60012;--orange:#f39700;--yellow:#c4b000;--green:#009944;
  --cyan:#00a6d6;--purple:#8f76d6;--metro-blue:#009bbf;--navy:#1f2f56;--accent:#1f2f56;
  --bg:#f7f8f5;--surface:#ffffff;--surface-sub:#f1f4f6;--surface-alt:#edf2f5;
  --border:#d7dde2;--border-strong:#b8c5ce;--text:#141413;--muted:#687681;--gold:#c4b000
}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.hdr{background:var(--surface);border-bottom:1px solid var(--border-strong);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;letter-spacing:.08em;color:var(--accent);line-height:1}
.timer{font-family:'Barlow Condensed',sans-serif;font-size:28px;color:var(--navy);line-height:1;text-align:right}
.timer.end{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sbar{background:var(--surface-sub);padding:10px 14px;display:flex;gap:8px;border-bottom:1px solid var(--border)}
.si{flex:1;background:var(--surface);border-radius:16px;padding:9px 8px;text-align:center;border:1px solid var(--border)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;line-height:1.1;color:var(--navy)}
.sv.b{color:var(--cyan)}.sv.g{color:var(--green)}.sv.p{color:var(--purple)}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.nt{flex:0 0 auto;padding:11px 10px;text-align:center;font-size:9px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Noto Sans JP',sans-serif;min-width:58px}
.nt.on{color:var(--accent);border-bottom-color:var(--accent)}
.ni{font-size:16px;display:flex;align-items:center;justify-content:center}
.cnt{flex:1;padding:16px 14px 24px;overflow-y:auto;background:var(--bg)}
.sec{font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;margin-top:18px}
.btabs{display:flex;gap:8px;margin-bottom:12px}
.btab{flex:1;padding:10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.btab.on.st{border-color:var(--cyan);color:var(--cyan);background:rgba(0,166,214,.08)}
.btab.on.ms{border-color:var(--purple);color:var(--purple);background:rgba(143,118,214,.08)}
.team-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.team-tab{flex:0 0 auto;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--muted);white-space:nowrap}
.team-tab.on{border-color:var(--accent);color:var(--accent)}
.bgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--surface-sub);border:1px solid var(--border);border-radius:20px;overflow:hidden;padding:5px}
.bcell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface);border-radius:13px;padding:2px 1px 3px;position:relative;overflow:hidden;border:1px solid var(--border)}
.bcell.hit{background:#eef8f2;border-color:#84c19a}
.bcell.hit::after{content:'';position:absolute;top:4px;right:4px;width:7px;height:4px;border-left:2px solid var(--green);border-bottom:2px solid var(--green);transform:rotate(-45deg)}
.bcell.pend{background:#fff5e8;border-color:#f0c280}
.bcell.free{background:#f5fbfd;border-color:var(--accent)}
.bcell.bline{background:#eef8fc;border-color:var(--cyan)}
.bcell.bline.mb{background:#f4effb;border-color:var(--purple)}
.bcell.corner{border-color:var(--border)}
.bcell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:100%;height:100%;padding-top:2px}
.bln{font-size:7px;color:var(--muted);line-height:1;text-align:center;width:100%;min-height:18px;display:flex;align-items:flex-end;justify-content:center}
.bcell.hit .bln{color:var(--green)}
.bnm{font-size:6.1px;font-weight:700;color:var(--text);line-height:1.08;text-align:center;word-break:keep-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:14px;padding:0 1px;letter-spacing:-.02em}
.bcell.hit .bnm{color:#146533}
.bcell.free .bnm{color:var(--accent);font-size:7px;min-height:auto}
.bcell.bline .bnm{color:var(--cyan)}
.bcell.bline.mb .bnm{color:var(--purple)}
.bcell.pend .bnm{color:var(--orange)}
.metro-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;width:100%;margin-bottom:2px}
.metro-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 3px;border-radius:999px;background:var(--surface);border:1.5px solid currentColor;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:10px;line-height:1;font-weight:700;letter-spacing:0;box-shadow:0 1px 0 rgba(20,20,19,.04)}
.metro-badge.sm{min-width:16px;height:16px;padding:0 2px;font-size:6.5px;border-width:1px}
.metro-badge.free{border-color:var(--accent);color:var(--accent)}
.cell-free-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:18px;padding:0 4px;border-radius:999px;border:1.25px solid var(--accent);color:var(--accent);background:#fff;font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:.06em}
.multiply-display{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;margin-bottom:12px;text-align:center}
.multiply-formula{font-family:'Barlow Condensed',sans-serif;font-size:32px;color:var(--navy);letter-spacing:.06em}
.score-detail{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;margin-bottom:12px}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.score-row:last-child{border-bottom:none;font-weight:700;color:var(--text);padding-top:8px;margin-top:4px}
.score-row .lbl{color:var(--muted)}
.score-row .val{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--navy)}
.score-row .val.neg{color:var(--red)}
.mission-item{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:11px;margin-bottom:7px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}
.mission-item.done{border-color:var(--green);background:rgba(0,166,80,.06)}
.mission-item.pend{border-color:var(--orange);background:rgba(246,139,30,.06)}
.mn{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--muted);flex-shrink:0;width:22px;line-height:1}
.mission-item.done .mn{color:var(--green)}.mission-item.pend .mn{color:var(--orange)}
.mb2{flex:1}
.mt{font-size:11px;font-weight:700;line-height:1.5}
.me{font-size:10px;color:var(--muted);margin-top:2px}
.ms-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0;margin-top:2px}
.ms-none{background:var(--surface-sub);color:var(--muted);border:1px solid var(--border)}
.ms-pend{background:rgba(246,139,30,.15);color:var(--orange)}
.ms-done{background:rgba(0,166,80,.15);color:var(--green)}
.ms-rej{background:rgba(230,0,18,.15);color:var(--red)}
.photo-area{border:1.5px dashed var(--border);border-radius:18px;padding:14px;text-align:center;cursor:pointer;position:relative;overflow:hidden;background:var(--surface)}
.photo-area.has{border-color:var(--green);border-style:solid}
.photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:12px;display:block}
.photo-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.btn{padding:12px;border-radius:14px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%;margin-top:8px}
.btn.pri{background:var(--accent);color:#fff}
.btn.grn{background:var(--green);color:#fff}
.btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn.red{background:var(--red);color:#fff}
.btn.ghost{background:none;color:var(--muted);border:none;font-size:13px;padding:8px}
.btn:active{transform:translateY(1px)}
.lsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.lbtn{padding:5px 10px;border-radius:999px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;font-family:'Noto Sans JP',sans-serif}
.sinp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px;outline:none}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--muted)}
.sinp.sm{padding:7px 10px;font-size:12px;margin-bottom:6px}
.slist{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;max-height:200px;overflow-y:auto}
.sbtn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:7px 9px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);font-size:11px;font-family:'Noto Sans JP',sans-serif}
.sbtn.oncard{border-color:rgba(0,178,214,.5);background:rgba(0,178,214,.06)}
.sbtn.done{opacity:.4}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rank{background:var(--surface);border-radius:20px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.rh{padding:8px 14px;background:var(--surface-sub);font-size:10px;color:var(--muted);letter-spacing:.2em;border-bottom:1px solid var(--border)}
.rrow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px}
.rrow:last-child{border-bottom:none}
.rrow.me{background:rgba(31,47,86,.06);border-left:3px solid var(--accent)}
.rn{font-family:'Barlow Condensed',sans-serif;font-size:24px;width:24px;color:var(--muted);flex-shrink:0}
.rn.g{color:var(--gold)}.rn.s{color:#b0b8c8}.rn.b{color:var(--orange)}
.rt{flex:1}.rtn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px}
.rtd{font-size:10px;color:var(--muted);margin-top:2px}
.rs{font-family:'Barlow Condensed',sans-serif;font-size:30px;color:var(--navy)}
.li{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.li:last-child{border-bottom:none}
.lic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--surface-sub);border:1px solid var(--border)}
.lic.s{border-color:var(--green)}.lic.bingo{border-color:var(--cyan)}
.lic.st{border-color:var(--yellow)}.lic.ev{border-color:var(--red)}.lic.ms{border-color:var(--purple)}
.lb{flex:1}.lt{font-size:12px;font-weight:700}.ls{font-size:10px;color:var(--muted);margin-top:1px}
.ltm{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--muted);flex-shrink:0}
.evbanner{border-radius:18px;padding:10px 12px;margin:6px 14px;display:flex;align-items:center;gap:10px}
.evbanner.active{background:rgba(230,0,18,.12);border:1px solid var(--red)}
.admin-tabs{display:flex;gap:6px;margin-bottom:12px}
.admin-tab{flex:1;padding:8px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.admin-tab.on{border-color:var(--accent);color:var(--accent);background:rgba(31,47,86,.08)}
.appr-item{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:12px;margin-bottom:8px}
.appr-btns{display:flex;gap:6px;margin-top:8px}
.appr-btn{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.appr-ok{background:rgba(0,166,80,.2);color:var(--green);border:1px solid rgba(0,166,80,.4)}
.appr-ng{background:rgba(230,0,18,.15);color:var(--red);border:1px solid rgba(230,0,18,.3)}
.center-overlay{position:fixed;inset:0;background:rgba(20,20,19,.28);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:24px;padding:20px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}
.modal-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;line-height:1.6}
.modal-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;text-align:center;letter-spacing:4px;margin-bottom:8px}
.modal-input.left{text-align:left;letter-spacing:normal;font-size:13px}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cswatch.sel{border-color:var(--navy);transform:scale(1.15)}
.code-display{background:var(--surface-sub);border:1px solid var(--border);border-radius:20px;padding:16px;text-align:center;margin-bottom:12px}
.code-big{font-family:'Barlow Condensed',sans-serif;font-size:56px;letter-spacing:.18em;color:var(--accent);line-height:1}
.mode-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
.mode-card.sel.basic{border-color:var(--cyan)}
.mode-card.sel.double{border-color:var(--purple)}
.mode-card-title{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.mode-card-desc{font-size:10px;color:var(--muted);line-height:1.6}
.route-row{display:flex;gap:6px;margin-bottom:10px}
.route-btn{flex:1;padding:9px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--muted)}
.route-btn.sel{border-color:var(--accent);color:var(--accent)}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.step-dot.active{background:var(--accent);width:20px;border-radius:4px}
.step-dot.done{background:var(--green)}
.step-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px}
.rule-screen{position:fixed;inset:0;background:var(--bg);z-index:700;overflow-y:auto;display:flex;flex-direction:column}
.rule-hero{padding:32px 20px 20px;text-align:center}
.rule-hero-title{font-family:'Barlow Condensed',sans-serif;font-size:42px;letter-spacing:.08em;color:var(--accent);margin-bottom:6px}
.rule-hero-sub{font-size:12px;color:var(--muted)}
.rule-body{flex:1;padding:0 16px 16px}
.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;margin-bottom:10px}
.rule-card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rule-card-body{font-size:12px;color:var(--muted);line-height:2}
.rule-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.rule-step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rule-step-text{font-size:12px;color:var(--muted);line-height:1.7;padding-top:2px}
.rule-check{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.rule-check-icon{color:var(--accent);font-size:12px;flex-shrink:0;padding-top:2px}
.rule-check-text{font-size:12px;color:var(--muted);line-height:1.7}
.rule-footer{padding:16px;position:sticky;bottom:0;background:rgba(247,248,245,.96);border-top:1px solid var(--border)}
.custom-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.custom-row:last-child{border-bottom:none}
.custom-label{font-size:12px;color:var(--muted)}
.custom-value{font-size:13px;font-weight:700}
.num-input{display:flex;align-items:center;gap:8px}
.num-btn{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif}
.toggle-row{display:flex;align-items:center;gap:8px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border);cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:left .2s}
.toggle.on::after{left:19px}
.plan-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;background:rgba(246,139,30,.15);color:var(--orange);border:1px solid rgba(246,139,30,.3)}
.tcon{position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:7px;width:360px;max-width:92vw;pointer-events:none}
.toast{background:var(--surface);border-radius:18px;padding:10px 14px;border:1px solid;animation:tin .3s ease-out;font-size:12px;display:flex;align-items:center;gap:9px}
.toast.ok{border-color:var(--green)}.toast.bingo{border-color:var(--cyan)}
.toast.warn{border-color:var(--orange)}.toast.ev{border-color:var(--red)}.toast.ms{border-color:var(--purple)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700}
.badge-pend{background:rgba(246,139,30,.15);color:var(--orange);border:1px solid rgba(246,139,30,.3)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:12px}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;gap:4px}
.chip.cyan{background:rgba(0,178,214,.12);color:var(--cyan);border:1px solid rgba(0,178,214,.25)}
.chip.purple{background:rgba(143,118,214,.12);color:var(--purple);border:1px solid rgba(143,118,214,.25)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
textarea.sinp{resize:vertical}
.icon{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:0;color:currentColor}
.icon svg{display:block}
.icon-chip{display:inline-flex;align-items:center;gap:6px}
.title-with-icon{display:flex;align-items:center;gap:8px}
@media (max-width:480px){
  .wrap{border:none}
  .logo{font-size:26px}
  .timer{font-size:24px}
  .code-big{font-size:48px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

const _db=firebase.database();
function stripPhotos(s){
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map(l=>({...l,photo:l.photo?'__local__':null}))}));
  if(r.pendingApprovals)r.pendingApprovals=r.pendingApprovals.map(a=>({...a,photo:a.photo?'__local__':null}));
  return r;
}
function savePhotos(code,s){
  const p={};
  (s.teams||[]).forEach(t=>(t.logs||[]).forEach((l,i)=>{if(l.photo&&l.photo!=='__local__')p[`l_${t.id}_${i}`]=l.photo}));
  (s.pendingApprovals||[]).forEach(a=>{if(a.photo&&a.photo!=='__local__')p[`a_${a.id}`]=a.photo});
  try{localStorage.setItem(`ph_${code}`,JSON.stringify(p))}catch(e){}
}
function mergePhotos(code,s){
  let p={};try{p=JSON.parse(localStorage.getItem(`ph_${code}`)||'{}')}catch(e){}
  const r=JSON.parse(JSON.stringify(s));
  r.teams=(r.teams||[]).map(t=>({...t,logs:(t.logs||[]).map((l,i)=>({...l,photo:l.photo==='__local__'?(p[`l_${t.id}_${i}`]||null):l.photo}))}));
  if(r.pendingApprovals)r.pendingApprovals=r.pendingApprovals.map(a=>({...a,photo:a.photo==='__local__'?(p[`a_${a.id}`]||null):a.photo}));
  return r;
}
function saveSession(session){try{localStorage.setItem('metro_run_session',JSON.stringify(session))}catch(e){}}
function loadSession(){try{return JSON.parse(localStorage.getItem('metro_run_session')||'null')}catch(e){return null}}
function clearSession(){try{localStorage.removeItem('metro_run_session')}catch(e){}}
async function fbSave(code,s){await _db.ref(`games_v6/${code}`).set(stripPhotos(s));savePhotos(code,s)}
async function fbLoad(code){const snap=await _db.ref(`games_v6/${code}`).get();if(!snap.exists())return null;return mergePhotos(code,snap.val())}
function fbSub(code,cb){const ref=_db.ref(`games_v6/${code}`);ref.on('value',snap=>{if(snap.exists())cb(mergePhotos(code,snap.val()))});return()=>ref.off('value')}

const MISSION_CARD_TARGETS={1:8,2:8,3:4};
const STATION_CARD_TARGETS={1:4,2:12,3:4};
const FIXED_CORNER_COUNT=2;
const RANDOM_CORNER_COUNT=2;
const EXCLUDED_BINGO_STATION_IDS=new Set(['otemachi']);
function shuffle(list){return [...list].sort(()=>Math.random()-.5)}
function getStationBadges(st){
  const raw=STATION_CODE_MAP[st.id];
  if(raw?.length)return raw;
  const line=METRO_LINES[st.line];
  return line?[{line:st.line,code:line.short}]:[];
}
function withStationMeta(st,routeMode){
  return{
    ...st,
    difficulty:st.diff,
    isFixedCornerCandidate:!!st.fixed,
    availableRouteModes:st.op==='toei'?['full']:['metro','full'],
    routeMode,
    badges:getStationBadges(st),
  };
}
function getPool(routeMode){
  const base=routeMode==='full'?[...ALL_STATIONS,...TOEI_STATIONS]:ALL_STATIONS;
  return base.map(st=>withStationMeta(st,routeMode));
}
function pickStations(pool,count){
  return shuffle(pool).slice(0,Math.max(0,count));
}
function buildStationPools(routeMode='metro'){
  const pool=getPool(routeMode).filter(st=>!EXCLUDED_BINGO_STATION_IDS.has(st.id));
  return{
    all:pool,
    fixedCorners:pool.filter(s=>s.isFixedCornerCandidate),
    randomCorners:pool.filter(s=>s.difficulty===3&&!s.isFixedCornerCandidate),
    byDifficulty:{
      1:pool.filter(s=>s.difficulty===1),
      2:pool.filter(s=>s.difficulty===2),
      3:pool.filter(s=>s.difficulty===3),
    },
  };
}
function allocateDifficultySlots(pools,usedIds){
  const selected=[];
  const remainingByDifficulty={
    1:pools.byDifficulty[1].filter(s=>!usedIds.has(s.id)),
    2:pools.byDifficulty[2].filter(s=>!usedIds.has(s.id)),
    3:pools.byDifficulty[3].filter(s=>!usedIds.has(s.id)),
  };
  const take=(difficulty,count)=>{
    const chosen=pickStations(remainingByDifficulty[difficulty],count);
    chosen.forEach(st=>usedIds.add(st.id));
    remainingByDifficulty[difficulty]=remainingByDifficulty[difficulty].filter(st=>!usedIds.has(st.id));
    selected.push(...chosen);
    return count-chosen.length;
  };

  let shortage=take(2,STATION_CARD_TARGETS[2]);
  if(shortage>0)shortage=take(1,shortage);
  if(shortage>0)take(3,shortage);

  shortage=take(1,STATION_CARD_TARGETS[1]);
  if(shortage>0)shortage=take(3,shortage);
  if(shortage>0)take(2,shortage);

  shortage=take(3,STATION_CARD_TARGETS[3]);
  if(shortage>0)shortage=take(1,shortage);
  if(shortage>0)take(2,shortage);

  return selected;
}
function placeStationsOnBoard(corners,normal){
  const card=new Array(25).fill(null);
  card[12]={id:'FREE',name:'FREE',line:null,isFree:true};
  let ci=0,ni=0;
  for(let i=0;i<25;i++){
    if(i===12)continue;
    card[i]=CORNER_INDICES.includes(i)?corners[ci++]:normal[ni++];
  }
  return card;
}
function genStationCard(routeMode='metro'){
  const pools=buildStationPools(routeMode);
  const fixedCorner=pickStations(pools.fixedCorners,FIXED_CORNER_COUNT);
  const usedIds=new Set(fixedCorner.map(s=>s.id));
  const randomCorner=pickStations(
    pools.randomCorners.filter(s=>!usedIds.has(s.id)),
    RANDOM_CORNER_COUNT
  );
  randomCorner.forEach(st=>usedIds.add(st.id));
  const corners=shuffle([...fixedCorner,...randomCorner]);
  const normal=shuffle(allocateDifficultySlots(pools,usedIds));
  return placeStationsOnBoard(corners,normal);
}
function withMissionMeta(mission){
  return{...mission,difficulty:mission.difficulty||2};
}
function pickMissions(pool,count){
  return shuffle(pool).slice(0,Math.max(0,count));
}
function buildMissionPools(missions=DEFAULT_MISSIONS){
  const pool=(missions||DEFAULT_MISSIONS).map(withMissionMeta);
  return{

    byDifficulty:{

      2:pool.filter(m=>m.difficulty===2),

function allocateMissionSlots(pools,usedIds){
  const selected=[];
  const remainingByDifficulty={
    1:pools.byDifficulty[1].filter(m=>!usedIds.has(m.id)),
    2:pools.byDifficulty[2].filter(m=>!usedIds.has(m.id)),
    3:pools.byDifficulty[3].filter(m=>!usedIds.has(m.id)),
  };
  const take=(difficulty,count)=>{
    const chosen=pickMissions(remainingByDifficulty[difficulty],count);
    chosen.forEach(m=>usedIds.add(m.id));
    remainingByDifficulty[difficulty]=remainingByDifficulty[difficulty].filter(m=>!usedIds.has(m.id));
    selected.push(...chosen);
    return count-chosen.length;
  };

  let shortage=take(2,MISSION_CARD_TARGETS[2]);
  if(shortage>0)shortage=take(1,shortage);
  if(shortage>0)take(3,shortage);

  shortage=take(1,MISSION_CARD_TARGETS[1]);
  if(shortage>0)shortage=take(2,shortage);
  if(shortage>0)take(3,shortage);

  shortage=take(3,MISSION_CARD_TARGETS[3]);
  if(shortage>0)shortage=take(2,shortage);
  if(shortage>0)take(1,shortage);

  return selected;
}
function genMissionCard(missions){
  const pools=buildMissionPools(missions||DEFAULT_MISSIONS);
  const usedIds=new Set();
  let corners=pickMissions(pools.byDifficulty[3],CORNER_INDICES.length);
  corners.forEach(m=>usedIds.add(m.id));
  if(corners.length<CORNER_INDICES.length){
    const fallback=[
      ...pickMissions(pools.byDifficulty[2].filter(m=>!usedIds.has(m.id)),CORNER_INDICES.length-corners.length),
      ...pickMissions(pools.byDifficulty[1].filter(m=>!usedIds.has(m.id)),CORNER_INDICES.length-corners.length),
    ].slice(0,CORNER_INDICES.length-corners.length);
    fallback.forEach(m=>usedIds.add(m.id));
    corners=[...corners,...fallback];
  }
  let normal=allocateMissionSlots(pools,usedIds);
  if(normal.length<20){
    const fallback=pickMissions(pools.all.filter(m=>!usedIds.has(m.id)),20-normal.length);
    fallback.forEach(m=>usedIds.add(m.id));
    normal=[...normal,...fallback];
  }
  return placeStationsOnBoard(shuffle(corners),shuffle(normal));
}
function checkBingo(card,reached){
  if(!card||!reached)return[];
  const lines=[];const ok=i=>card[i]&&(card[i].isFree||reached.has(card[i].id));
  for(let r=0;r<5;r++){const c=[0,1,2,3,4].map(x=>r*5+x);if(c.every(ok))lines.push(c)}
  for(let c=0;c<5;c++){const r=[0,1,2,3,4].map(x=>x*5+c);if(r.every(ok))lines.push(r)}
  if([0,6,12,18,24].every(ok))lines.push([0,6,12,18,24]);
  if([4,8,12,16,20].every(ok))lines.push([4,8,12,16,20]);
  return lines;
}
function calcScore(team,config){
  if(!team)return{stB:0,msB:0,masks:0,total:0};
  const canonicalStationCard=getCanonicalStationCard(team,config?.routeMode||'metro');
  const stR=new Set(team.stationReached||[]);
  const msR=new Set(team.missionReached||[]);
  const stBingo=checkBingo(canonicalStationCard,stR);
  const msBingo=checkBingo(team.missionCard,msR);
  const stMasks=(team.stationReached||[]).filter(id=>id!=='FREE').length;
  const msMasks=(team.missionReached||[]).filter(id=>id!=='FREE').length;
  const gp=(team.goalPenalty||0)+(team.manualScoreDelta||0);
  const stPoints=stMasks+stBingo.length*3;
  const msPoints=msMasks+msBingo.length*3;
  const mode=config?.mode||'basic';
  const total=mode==='double'?(stPoints*msPoints)+gp:stPoints+gp;
  return{stB:stBingo.length,msB:msBingo.length,masks:stMasks+msMasks,stMasks,msMasks,stPoints,msPoints,total};
}

      case 'town': return<g {...stroke}><path d="M4 20V9l4-3 4 3v11"/><path d="M12 20V11l4-3 4 3v9"/><path d="M7 13h1"/><path d="M15 14h1"/></g>;
      case 'bath': return<g {...stroke}><path d="M5 12h14"/><path d="M6 12v2a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-2"/><path d="M8 12V8a2 2 0 1 1 4 0"/></g>;
      case 'mascot': return<g {...stroke}><circle cx="12" cy="9" r="3.5"/><path d="M8 20a4 4 0 0 1 8 0"/><path d="M8.5 6.5 6.5 5"/><path d="m15.5 6.5 2-1.5"/></g>;
      case 'metro-mark': return<g><circle cx="12" cy="12" r="10" fill="#e60012"/><circle cx="12" cy="12" r="5.2" fill="#fff"/><path d="M8.3 16.6V7.6h1.8l1.9 4.6 1.9-4.6h1.8v9h-1.8v-5.2l-1.4 3.5h-1l-1.4-3.5v5.2Z" fill="#111"/></g>;

function normalizeStationCell(cell){
  if(!cell)return cell;
  if(cell.isFree||cell.id==='FREE')return {...cell,isFree:true,name:'FREE',badges:[]};
  return{...cell,badges:getStationBadges(cell)};
}
function repairStationCard(card,routeMode='metro'){
  const pool=getPool(routeMode).filter(st=>!EXCLUDED_BINGO_STATION_IDS.has(st.id));
  const normalized=(card||[]).map(normalizeStationCell);
  const usedIds=new Set(normalized.filter(cell=>cell&&!cell.isFree&&!EXCLUDED_BINGO_STATION_IDS.has(cell.id)).map(cell=>cell.id));
  return normalized.map(cell=>{
    if(!cell||cell.isFree||!EXCLUDED_BINGO_STATION_IDS.has(cell.id))return cell;
    usedIds.delete(cell.id);
    const targetDifficulty=cell.difficulty||cell.diff||3;
    const replacementPool=pool.filter(st=>!usedIds.has(st.id)&&st.difficulty===targetDifficulty);
    const fallbackPool=pool.filter(st=>!usedIds.has(st.id));
    const replacement=shuffle(replacementPool.length?replacementPool:fallbackPool)[0];
    if(!replacement)return cell;
    usedIds.add(replacement.id);
    return replacement;
  });
}
function normalizeTeamCards(team,routeMode='metro'){
  return{...team,stationCard:repairStationCard(team.stationCard,routeMode)};
}
function getCanonicalStationCard(team,routeMode='metro'){
  return repairStationCard(team?.stationCard||[],routeMode);
}
function syncTeamsToCount(teams,count,cfg,missions){
  let next=[...(teams||[])];
  const target=Math.max(2,count||2);
  while(next.length<target)next=[...next,createTeam(next.length,cfg,missions)];
  while(next.length>target){
    const last=next[next.length-1];
    const hasMembers=(last.memberIds||[]).length>0;
    if(hasMembers)break;
    next=next.slice(0,-1);
  }
  return next;
}
function hydrateTeamMembers(gameState){
  const participants=(gameState?.participants||[]).filter(p=>p.active!==false);
  const teams=(gameState?.teams||[]).map(team=>({
    ...normalizeTeamCards(team,gameState?.config?.routeMode||'metro'),
    memberIds:participants.filter(p=>p.teamId===team.id&&p.status==='assigned').map(p=>p.id),
  }));
  return {...gameState,teams};
}
function canJoinGame(gameState){
  return ['recruiting','team_building'].includes(gameState?.state);
}
function canEditTeams(gameState){
  return ['recruiting','team_building'].includes(gameState?.state);
}
function getStartBlockers(gameState){
  const teams=gameState?.teams||[];
  const counts=getParticipantCounts(gameState);
  const assignedByTeam=teams.map(team=>counts.assigned.filter(p=>p.teamId===team.id).length);
  const blockers=[];
  if(teams.length<2)blockers.push('最低2チーム必要です');
  if(assignedByTeam.some(count=>count===0))blockers.push('各チームに最低1人ずつ割り当ててください');
  if(counts.joined.length>0)blockers.push('未割り当ての参加者がいます');
  return blockers;
}
function canStartGame(gameState){return getStartBlockers(gameState).length===0}
function autoAssignParticipants(gameState){
  const teams=[...(gameState?.teams||[])];
  const participants=[...(gameState?.participants||[])];
  const unassigned=participants.filter(p=>p.active!==false&&p.status==='joined'&&!p.teamId);
  const counts=teams.map(team=>participants.filter(p=>p.active!==false&&p.status==='assigned'&&p.teamId===team.id).length);
  const sorted=teams.map((team,index)=>({team,index,count:counts[index]})).sort((a,b)=>a.count-b.count||a.index-b.index);
  const nextParticipants=participants.map(p=>({...p}));
  unassigned.forEach((participant,idx)=>{
    const target=sorted[idx%sorted.length];
    const ref=nextParticipants.find(p=>p.id===participant.id);
    ref.teamId=target.team.id;
    ref.status='assigned';
    target.count+=1;
    sorted.sort((a,b)=>a.count-b.count||a.index-b.index);
  });
  return hydrateTeamMembers({...gameState,participants:nextParticipants});
}

          {visited&&<span style={{fontSize:8,color:'var(--green)',marginLeft:'auto'}}><Icon name="check" size={10}/></span>}
        </button>;
      })}
    </div>
    {sel&&<>
      <p className="sec" style={{marginTop:12}}>到着証拠写真（駅名看板を写してください）</p>
      <div className={`photo-area ${photoPreview?'has':''}`} onClick={()=>fileRef.current.click()}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" className="photo-input" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhotoPreview(ev.target.result);r.readAsDataURL(f);}}/>
        {photoPreview?<><img src={photoPreview} className="photo-preview" alt="証拠"/><div style={{fontSize:10,color:'var(--green)',marginTop:5}} className="icon-chip"><Icon name="check" size={12}/>写真添付済み</div></>:<><div style={{fontSize:26,marginBottom:5}}><Icon name="camera" size={28}/></div><div style={{fontSize:11,color:'var(--muted)'}}>駅名看板の写真を添付（推奨）</div></>}
      </div>
    </>}
    <button className={`btn ${sel?'grn':'sec'}`} style={{marginTop:10}} onClick={()=>{if(!sel)return;onArrive(sel,photoPreview);setSel(null);setPhotoPreview(null);setSearch('');}} disabled={!sel}>
      {sel?<span className="icon-chip"><Icon name="pin" size={16}/>{sel.name}に到着！</span>:'駅を選んでください'}
    </button>
  </div>;
}

// ── MISSION PAGE ──
function MissionPage({team,onSubmitMission}){
  const [sel,setSel]=useState(null);
  const [photo,setPhoto]=useState(null);
  const [note,setNote]=useState('');
  const fileRef=useRef();
  const msR=new Set(team.missionReached||[]);
  const cardMissions=(team.missionCard||[]).filter(c=>!c.isFree);
  const currentStationId=team.currentStation||null;
  const usedMissionId=currentStationId?(team.missionStationClaims||{})[currentStationId]:null;
  const canSubmitAtCurrentStation=!!currentStationId&&!usedMissionId;
  if(sel)return<div>
    <button onClick={()=>{setSel(null);setPhoto(null);setNote('');}} className="btn ghost" style={{marginTop:0,marginBottom:8,textAlign:'left'}}>← 一覧に戻る</button>
    <div style={{background:'var(--surface-sub)',borderRadius:18,padding:12,marginBottom:12,border:'1px solid var(--border)'}}>
      <div style={{fontSize:22,marginBottom:6}}><MissionIcon name={sel.icon} size={24}/></div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{sel.text}</div>
      <div style={{fontSize:11,color:'var(--muted)'}} className="icon-chip"><Icon name="clipboard" size={13}/>証拠：{sel.evidence}</div>
    </div>
    <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,lineHeight:1.7}}>
      {currentStationId
        ?`現在地の駅で記録します${usedMissionId?'（この駅ではすでに1件記録済み）':''}`
        :'先に到着タブで駅到着を記録してください'}
    </div>
    <p className="sec">証拠写真（任意）</p>
    <div className={`photo-area ${photo?'has':''}`} onClick={()=>fileRef.current.click()}>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" className="photo-input" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);}}/>
      {photo?<><img src={photo} className="photo-preview" alt="証拠"/><div style={{fontSize:10,color:'var(--green)',marginTop:5}} className="icon-chip"><Icon name="check" size={12}/>写真添付済み</div></>:<><div style={{fontSize:26,marginBottom:5}}><Icon name="camera" size={28}/></div><div style={{fontSize:11,color:'var(--muted)'}}>証拠写真を撮影または選択</div></>}
    </div>
    <input className="sinp" style={{marginTop:10}} placeholder="補足メモ（任意）" value={note} onChange={e=>setNote(e.target.value)}/>
    <button className={`btn ${canSubmitAtCurrentStation?'pri':'sec'}`} disabled={!canSubmitAtCurrentStation} onClick={()=>{if(!canSubmitAtCurrentStation)return;onSubmitMission(sel.id,photo,note);setSel(null);setPhoto(null);setNote('');}}>
      <span className="icon-chip"><Icon name="share" size={15}/>{photo?'写真付きで申請する':'この内容で申請する'}</span>
    </button>
  </div>;
  return<div>
    <div style={{background:'rgba(143,118,214,.1)',border:'1px solid var(--purple)',borderRadius:10,padding:'9px 12px',marginBottom:12,fontSize:11}}>
      <span style={{fontWeight:700,color:'var(--purple)'}} className="icon-chip"><Icon name="target" size={14}/>ミッションビンゴ</span>　内容を記録すると、その場でマスが開きます。1駅につき1件までです
    </div>
    {cardMissions.map((m,idx)=>{
      const done=msR.has(m.id);
      return<div key={m.id} className={`mission-item ${done?'done':''}`} onClick={()=>!done&&setSel(m)}>
        <div className="mn">{idx+1}</div>
        <div className="mb2">
          <div className="mt"><span className="icon-chip"><MissionIcon name={m.icon} size={15}/>{m.text}</span></div>
          <div className="me"><span className="icon-chip"><Icon name="clipboard" size={12}/>{m.evidence}</span></div>
        </div>
        <div className={`ms-badge ${done?'ms-done':'ms-none'}`}>
          {done?'達成済み':'未達成'}
        </div>
      </div>;
    })}
  </div>;
}

// ── SCORE PAGE ──
function ScorePage({gameState,myTeamId,isFinished}){
  const config=gameState.config;const mode=config?.mode||'basic';
  const teams=[...(gameState.teams||[])].map(t=>({
    ...t,
    stationCard:getCanonicalStationCard(t,config?.routeMode||'metro'),
    ...calcScore(t,config)
  }));
  const myTeam=teams.find(t=>t.id===myTeamId);
  const renderBoard=(team)=>(
    <div key={team.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:12,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <div className="dot" style={{background:team.color,width:10,height:10}}></div>
        <div style={{fontWeight:700}}>{team.name}</div>
        <div style={{marginLeft:'auto',fontFamily:'Barlow Condensed',fontSize:26,color:'var(--navy)'}}>{team.total}pt</div>
      </div>
      <div className="bgrid" style={{marginBottom:8}}>
        {(team.stationCard||[]).map((cell,i)=>{
          const hit=cell.isFree||(team.stationReached||[]).includes(cell.id);
          return<div key={i} className={`bcell ${hit&&!cell.isFree?'hit':''} ${cell.isFree?'free':''}`}>
            <div className="bcell-inner">
              <div className="bln">{cell.isFree?<div className="metro-badges"><span className="cell-free-badge">FREE</span></div>:<MetroBadgeGroup station={cell} size="sm"/>}</div>
              <div className="bnm">{cell.isFree?'FREE':cell.name}</div>
            </div>
          </div>;
        })}
      </div>
      <div>{[...(team.logs||[])].slice(-6).reverse().map((log,i)=>(
        <div key={i} className="li">
          <div className={`lic ${log.type}`}><LogIcon type={log.type}/></div>
          <div className="lb"><div className="lt">{log.title}</div><div className="ls">{log.sub}</div></div>
          <div className="ltm">{log.time}</div>
        </div>
      ))}</div>
    </div>
  );
  if(isFinished)return<div>
    <p className="sec">終了後リザルト</p>
    {teams.map(renderBoard)}
  </div>;
  if(!myTeam)return<div className="empty">チームに割り当てられるとスコアが表示されます</div>;
  return<div>
    <p className="sec">得点内訳</p>
    <div className="score-detail">
      {mode==='double'?<>
      <div className="score-row"><span className="lbl">駅ポイント</span><span className="val">{myTeam.stPoints}pt</span></div>
      <div className="score-row"><span className="lbl">ミッションポイント</span><span className="val">{myTeam.msPoints}pt</span></div>
      <div className="score-row"><span className="lbl">掛け算</span><span className="val">{myTeam.stPoints} × {myTeam.msPoints}</span></div>
      <div className="score-row"><span>合計</span><span className="val" style={{fontSize:22}}>{myTeam.total}pt</span></div>
      </>:<>
      <div className="score-row"><span className="lbl">マス（{myTeam.masks}×1pt）</span><span className="val">{myTeam.masks}pt</span></div>
      <div className="score-row"><span className="lbl">ビンゴ（{myTeam.stB}列×3pt）</span><span className="val">{myTeam.stB*3}pt</span></div>
      <div className="score-row"><span>合計</span><span className="val" style={{fontSize:22}}>{myTeam.total}pt</span></div>
      </>}
    </div>
    <p className="sec">プレイログ</p>
    <div>{[...(myTeam.logs||[])].reverse().map((log,i)=>(
      <div key={i} className="li">
        <div className={`lic ${log.type}`}><LogIcon type={log.type}/></div>
        <div className="lb"><div className="lt">{log.title}</div><div className="ls">{log.sub}</div>
          {log.photo&&<img src={log.photo} style={{width:'100%',maxHeight:70,objectFit:'cover',borderRadius:5,marginTop:5}} alt=""/>}
        </div>
        <div className="ltm">{log.time}</div>
      </div>
    ))}</div>
  </div>;
}

// ── ADMIN PAGE ──
function AdminPage({gameState,onFireEvent,onAddEvent,onApprove,onReject,onApproveParticipant,onRejectParticipant,onAssignParticipant,onRenameTeam,onSetTeamColor,onChangeGameState,onAutoAssign,onUpdateConfig,onAdjustScore}){

        </div>

        <button className="btn red" style={{marginTop:4}} onClick={()=>{if(!newEv.name)return;onAddEvent({...newEv,id:'e'+Date.now(),status:'pending',triggeredAt:null});setNewEv({name:'',desc:'',type:'manual',scheduledTime:'',reward:''});}}><span className="icon-chip"><Icon name="plus" size={14}/>追加</span></button>
      </div>
    </>}
    {tab==='scores'&&(gameState.teams||[]).map(t=>{

      <textarea className="sinp" placeholder="大会ごとの差分ルール" value={customRules} onChange={e=>setCustomRules(e.target.value)} style={{minHeight:80}}/>

// ── MAIN APP ──
function App(){
  const [screen,setScreen]=useState('start'); // start|organizer|player|admin|game
  const [gameState,setGameState]=useState(null);
  const [myParticipantId,setMyParticipantId]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [showRule,setShowRule]=useState(false);
  const [tab,setTab]=useState('home');
  const [toasts,setToasts]=useState([]);
  const [showShare,setShowShare]=useState(false);
  const [nowTs,setNowTs]=useState(Date.now());
  const [sessionReady,setSessionReady]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    const iv=setInterval(()=>{
      setNowTs(Date.now());
      setGameState(prev=>{
        if(!prev)return prev;
        let changed=false;
        let next={...prev};
        const t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        const events=(next.events||[]).map(ev=>{
          if(ev.type==='time'&&ev.status==='pending'&&ev.scheduledTime===t){changed=true;return{...ev,status:'active',triggeredAt:Date.now()}}
          return ev;
        });
        if(changed){
          const activated=events.filter(ev=>ev.type==='time'&&ev.status==='active'&&!(next.events||[]).find(prevEv=>prevEv.id===ev.id&&prevEv.status==='active'));
          next={...next,events,teams:(next.teams||[]).map(team=>({...team,logs:[...(team.logs||[]),...activated.map(ev=>({type:'ev',title:'イベント自動発動',sub:ev.name,time:nowTime()}))]}))};
        }
        if(next.state==='in_progress'&&next.endAt&&Date.now()>=new Date(next.endAt).getTime()){
          changed=true;
          next={...next,state:'finished',finishedAt:isoNow(),auditLogs:[...(next.auditLogs||[]),{id:`audit_${Date.now()}`,type:'system',time:nowTime(),message:'大会を自動終了'}]};
        }
        if(!changed)return prev;
        const gs=hydrateTeamMembers(next);fbSave(gs.gameCode,gs);return gs;
      });
    },1000);
    return()=>clearInterval(iv);
  },[]);

  const showToast=useCallback((t)=>{
    const id=Date.now();
    setToasts(p=>[...p,{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const subGame=useCallback((code)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=fbSub(code,ns=>{
      const hydrated=hydrateTeamMembers(ns);
      setGameState(prev=>{
        const hasNewActive=(hydrated.events||[]).find(e=>e.status==='active'&&!(prev?.events||[]).find(pe=>pe.id===e.id&&pe.status==='active'));
        if(hasNewActive)showToast({type:'ev',icon:'flash',title:'イベント発動！',sub:hasNewActive.name});
        return hydrated;
      });
    });
  },[showToast]);

  useEffect(()=>{
    let mounted=true;
    (async()=>{
      const session=loadSession();
      if(!session?.code){if(mounted)setSessionReady(true);return;}
      const gsRaw=await fbLoad(session.code);
      const gs=gsRaw?hydrateTeamMembers(gsRaw):null;
      if(!mounted){return;}
      if(!gs){clearSession();setSessionReady(true);return;}
      if(session.isAdmin){
        setGameState(gs);setIsAdmin(true);setScreen('game');setTab('admin');subGame(session.code);setSessionReady(true);return;
      }
      const participant=(gs.participants||[]).find(p=>p.id===session.participantId&&p.active!==false);
      if(participant){
        setGameState(gs);setMyParticipantId(participant.id);setIsAdmin(false);setScreen('game');setTab('home');subGame(session.code);
      }else{
        clearSession();
      }
      setSessionReady(true);
    })();
    return()=>{mounted=false};
  },[subGame]);

  const handleCreateGame=useCallback(async(form,missions)=>{
    const gs=initGame(form,missions);
    await fbSave(gs.gameCode,gs);
    setGameState(gs);setMyParticipantId(null);setScreen('game');setIsAdmin(true);setTab('admin');
    saveSession({code:gs.gameCode,isAdmin:true});
    subGame(gs.gameCode);
    setTimeout(()=>setShowShare(true),100);
  },[subGame]);

  const handleJoinGame=useCallback(async(code,playerName,_unused,asAdmin=false)=>{
    const gsRaw=await fbLoad(code);
    const gs=gsRaw?hydrateTeamMembers(gsRaw):null;
    if(!gs)return false;
    if(asAdmin){setGameState(gs);setIsAdmin(true);setTab('admin');setScreen('game');saveSession({code,isAdmin:true});subGame(code);return true;}
    if(!canJoinGame(gs))return '現在は新規参加を受け付けていません';
    const dup=(gs.participants||[]).find(p=>p.active!==false&&p.name===playerName);
    if(dup)return '同じ名前の参加者がすでにいます';
    const activeJoined=(gs.participants||[]).filter(p=>p.active!==false&&p.status!=='pending').length;
    const status=activeJoined>=(gs.config?.playerLimit||0)?'pending':'joined';
    const participant=createParticipant(playerName,status);
    const updated=hydrateTeamMembers({...gs,participants:[...(gs.participants||[]),participant],auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:`${playerName} が ${status==='pending'?'承認待ち':'参加'} で登録`} ]});
    await fbSave(code,updated);
    setGameState(updated);setMyParticipantId(participant.id);setScreen('game');setIsAdmin(false);setTab('home');
    saveSession({code,participantId:participant.id,isAdmin:false});
    subGame(code);
    return true;
  },[subGame]);

  const save=useCallback(async(newGs)=>{
    const hydrated=hydrateTeamMembers(newGs);
    await fbSave(hydrated.gameCode,hydrated);
    setGameState(hydrated);
  },[]);

  const updateGame=useCallback(async(updater)=>{
    if(!gameState)return;
    const next=typeof updater==='function'?updater(gameState):updater;
    await save(next);
  },[gameState,save]);

  const currentParticipant=(gameState?.participants||[]).find(p=>p.id===myParticipantId&&p.active!==false)||null;
  const myTeamId=currentParticipant?.teamId||null;
  const myTeam=gameState?.teams.find(t=>t.id===myTeamId)||null;

  const handleArrive=useCallback(async(station,photo)=>{
    if(!myTeamId||!gameState||gameState.state!=='in_progress')return;
    const myTeam=gameState.teams.find(t=>t.id===myTeamId);
    if(!myTeam||(myTeam.stationReached||[]).includes(station.id)){showToast({type:'warn',icon:'alert',title:'既に記録済みです',sub:station.name});return;}
    const canonicalCard=getCanonicalStationCard(myTeam,gameState?.config?.routeMode||'metro');
    const newReached=[...(myTeam.stationReached||[]),station.id];
    const reachedSet=new Set(newReached);
    const isOnCard=(canonicalCard||[]).some(c=>c.id===station.id);
    const t=nowTime();
    const log={type:'s',title:`${station.name}に到着`,sub:isOnCard?'ビンゴカードの駅！':'',time:t,photo:photo||null};
    const prevBingo=checkBingo(canonicalCard,new Set(myTeam.stationReached||[]));
    const newBingo=checkBingo(canonicalCard,reachedSet);
    let newLogs=[...(myTeam.logs||[]),log];
    showToast({type:'ok',icon:'pin',title:`${station.name}に到着！`,sub:isOnCard?'ビンゴカードの駅！':''});
    if(newBingo.length>prevBingo.length){
      const diff=newBingo.length-prevBingo.length;
      setTimeout(()=>showToast({type:'bingo',icon:'target',title:`BINGO! ${diff}列達成！`,sub:'スコアが上がりました！'}),500);
      newLogs=[...newLogs,{type:'bingo',title:`駅ビンゴ達成！ ${diff}列`,sub:'スコア更新',time:t}];
    }
    const updated=gameState.teams.map(t2=>t2.id===myTeamId?{...t2,stationReached:newReached,logs:newLogs,currentStation:station.id}:t2);
    await save({...gameState,teams:updated});setTab('bingo');
  },[myTeamId,gameState,showToast,save]);

  const handleMissionSubmit=useCallback(async(missionId,photo,note)=>{
    if(!myTeamId||!gameState||gameState.state!=='in_progress')return;
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==myTeamId)return t;
      if((t.missionReached||[]).includes(missionId))return t;
      if(!t.currentStation||(t.missionStationClaims||{})[t.currentStation])return t;
      const newReached=[...(t.missionReached||[]),missionId];
      const prevBingo=checkBingo(t.missionCard,new Set(t.missionReached||[]));
      const newBingo=checkBingo(t.missionCard,new Set(newReached));
      const missionText=(gameState.missions||DEFAULT_MISSIONS).find(m=>m.id===missionId)?.text||'';
      const stationName=getPool(gameState?.config?.routeMode||'metro').find(st=>st.id===t.currentStation)?.name||t.currentStation;
      const sub=note?`${missionText} / ${stationName} / ${note}`:`${missionText} / ${stationName}`;
      let newLogs=[...(t.logs||[]),{type:'ms',title:'ミッション達成！',sub,time:nowTime(),photo:photo||null}];
      if(newBingo.length>prevBingo.length){
        const diff=newBingo.length-prevBingo.length;
        newLogs=[...newLogs,{type:'bingo',title:`ミッションBINGO！ ${diff}列`,sub:'スコア更新',time:nowTime()}];
      }
      return{
        ...t,
        missionSubmissions:{...(t.missionSubmissions||{}),[missionId]:'completed'},
        missionStationClaims:{...(t.missionStationClaims||{}),[t.currentStation]:missionId},
        missionReached:newReached,
        logs:newLogs,
      };
    });
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.teamId!==myTeamId||a.missionId!==missionId)});
    showToast({type:'ms',icon:'target',title:'ミッションを記録しました',sub:'1駅につき1件まで'});
  },[myTeamId,gameState,showToast,save]);

  const handleApprove=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{
      if(t.id!==appr.teamId)return t;
      const subs={...(t.missionSubmissions||{}),[appr.missionId]:'approved'};
      const newReached=[...(t.missionReached||[]),appr.missionId];
      const prevBingo=checkBingo(t.missionCard,new Set(t.missionReached||[]));
      const newBingo=checkBingo(t.missionCard,new Set(newReached));
      let newLogs=[...(t.logs||[]),{type:'ms',title:'ミッション承認！',sub:(gameState.missions||DEFAULT_MISSIONS).find(m=>m.id===appr.missionId)?.text||'',time:nowTime()}];
      if(newBingo.length>prevBingo.length){const diff=newBingo.length-prevBingo.length;newLogs=[...newLogs,{type:'bingo',title:`ミッションBINGO！ ${diff}列`,sub:'スコア更新',time:nowTime()}];}
      return{...t,missionSubmissions:subs,missionReached:newReached,logs:newLogs};
    });
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'ok',icon:'check',title:'承認しました',sub:''});
  },[gameState,showToast,save]);

  const handleReject=useCallback(async(appr)=>{
    const updatedTeams=gameState.teams.map(t=>{if(t.id!==appr.teamId)return t;return{...t,missionSubmissions:{...(t.missionSubmissions||{}),[appr.missionId]:'rejected'}};});
    await save({...gameState,teams:updatedTeams,pendingApprovals:(gameState.pendingApprovals||[]).filter(a=>a.id!==appr.id)});
    showToast({type:'warn',icon:'close',title:'却下しました',sub:''});
  },[gameState,showToast,save]);

  const handleFireEvent=useCallback(async(evId,action='start')=>{
    const events=(gameState.events||[]).map(ev=>{if(ev.id!==evId)return ev;return action==='end'?{...ev,status:'done'}:{...ev,status:'active',triggeredAt:Date.now()};});
    if(action==='start'){const ev=(gameState.events||[]).find(e=>e.id===evId);if(ev)showToast({type:'ev',icon:'flash',title:'イベント発動！',sub:ev.name});}
    const target=(gameState.events||[]).find(e=>e.id===evId);
    const teams=(gameState.teams||[]).map(team=>({...team,logs:[...(team.logs||[]),target?{type:'ev',title:action==='end'?'イベント終了':'イベント発動',sub:target.name,time:nowTime()}:null].filter(Boolean)}));
    await save({...gameState,events,teams});
  },[gameState,showToast,save]);

  const handleAddEvent=useCallback(async(ev)=>{await save({...gameState,events:[...(gameState.events||[]),ev]});},[gameState,save]);
  const handleApproveParticipant=useCallback(async(participantId)=>{
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===participantId?{...p,status:'joined'}:p),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'参加申請を承認'}]}));
  },[updateGame]);
  const handleRejectParticipant=useCallback(async(participantId)=>{
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).filter(p=>p.id!==participantId),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'参加申請を拒否'}]}));
  },[updateGame]);
  const handleAssignParticipant=useCallback(async(participantId,teamId)=>{
    if(!gameState||!canEditTeams(gameState))return;
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===participantId?{...p,teamId,status:teamId?'assigned':'joined'}:p),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'participant',time:nowTime(),message:'チーム編成を更新'}]}));
  },[gameState,updateGame]);
  const handleRenameTeam=useCallback(async(teamId,name)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,name:name||t.name,logs:[...(t.logs||[]),{type:'st',title:'チーム名変更',sub:name||t.name,time:nowTime()}]}:t)}));
  },[updateGame]);
  const handleSetTeamColor=useCallback(async(teamId,color)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,color,logs:[...(t.logs||[]),{type:'st',title:'チームカラー変更',sub:color,time:nowTime()}]}:t)}));
  },[updateGame]);
  const handleChangeGameState=useCallback(async(nextState)=>{
    await updateGame(gs=>{
      if(nextState==='in_progress'&&!canStartGame(gs))return gs;
      const startedAt=nextState==='in_progress'&&!gs.startedAt?Date.now():gs.startedAt;
      return{...gs,state:nextState,startedAt,finishedAt:nextState==='finished'?isoNow():gs.finishedAt,auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'state',time:nowTime(),message:`大会状態を ${nextState} に変更`} ]};
    });
    if(nextState==='in_progress')setTab('bingo');
  },[updateGame]);
  const handleAutoAssign=useCallback(async()=>{if(!gameState||!canEditTeams(gameState))return;await updateGame(gs=>autoAssignParticipants(gs));},[gameState,updateGame]);
  const handleUpdateConfig=useCallback(async(partial)=>{
    await updateGame(gs=>{
      const config={...(gs.config||{}),...partial};
      const teams=syncTeamsToCount(gs.teams,config.teamCount,config,gs.missions);
      return hydrateTeamMembers({...gs,config,teams});
    });
  },[updateGame]);
  const handleAdjustScore=useCallback(async(teamId,delta)=>{
    await updateGame(gs=>({...gs,teams:(gs.teams||[]).map(t=>t.id===teamId?{...t,manualScoreDelta:(t.manualScoreDelta||0)+delta,logs:[...(t.logs||[]),{type:'st',title:'スコア手動修正',sub:`${delta>0?'+':''}${delta}pt`,time:nowTime()}]}:t),auditLogs:[...(gs.auditLogs||[]),{id:`audit_${Date.now()}`,type:'score',time:nowTime(),message:`スコア手動修正 ${delta>0?'+':''}${delta}pt`}]}));
  },[updateGame]);
  const handleRenameSelf=useCallback(async(name)=>{
    if(!currentParticipant||!name.trim())return;
    const trimmed=name.trim();
    const dup=(gameState?.participants||[]).find(p=>p.active!==false&&p.id!==currentParticipant.id&&p.name===trimmed);
    if(dup){showToast({type:'warn',icon:'alert',title:'同じ名前は使えません',sub:''});return;}
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,name:trimmed,nameHistory:[...(p.nameHistory||[]),{name:trimmed,changedAt:isoNow()}]}:p),teams:(gs.teams||[]).map(t=>t.id===currentParticipant.teamId?{...t,logs:[...(t.logs||[]),{type:'st',title:'プレイヤー名変更',sub:`${currentParticipant.name} → ${trimmed}`,time:nowTime()}]}:t)}));
    showToast({type:'ok',icon:'note',title:'名前を変更しました',sub:trimmed});
  },[currentParticipant,gameState,showToast,updateGame]);
  const handleLeaveGame=useCallback(async()=>{
    if(!currentParticipant)return;
    await updateGame(gs=>({...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,teamId:null,status:'joined',active:false}:p),teams:(gs.teams||[]).map(t=>t.id===currentParticipant.teamId?{...t,logs:[...(t.logs||[]),{type:'st',title:'プレイヤー離脱',sub:currentParticipant.name,time:nowTime()}]}:t)}));
    exitGameSession({setGameState,setMyParticipantId,setIsAdmin,setScreen,setTab,setShowShare});
  },[currentParticipant,updateGame]);
  const handleExitToStart=useCallback(()=>{
    exitGameSession({setGameState,setMyParticipantId,setIsAdmin,setScreen,setTab,setShowShare});
  },[]);

  // Timer
  const cfg=gameState?.config;
  const gameDur=gameState?.startAt&&gameState?.endAt?Math.max(1,new Date(gameState.endAt)-new Date(gameState.startAt)):(cfg?.gameDuration||8*60*60*1000);
  const remaining=gameState?.endAt?Math.max(0,new Date(gameState.endAt)-nowTs):0;
  const rH=Math.floor(remaining/3600000);
  const rM=Math.floor((remaining%3600000)/60000);
  const rS=Math.floor((remaining%60000)/1000);
  const timerStr=`${rH}:${String(rM).padStart(2,'0')}:${String(rS).padStart(2,'0')}`;
  const isEnding=remaining<30*60*1000;
  const score=myTeam?calcScore(myTeam,cfg):{total:0,stB:0,msB:0,masks:0};
  const activeEvents=(gameState?.events||[]).filter(e=>e.status==='active');
  const participantCounts=getParticipantCounts(gameState);
  const pCount=(gameState?.pendingApprovals||[]).length+participantCounts.pending.length;
  const mode=cfg?.mode||'basic';
  const progressRatio=gameDur?remaining/gameDur:1;
  const canViewOpponents=(gameState?.state==='finished')||progressRatio>=0.25;
  const showOpponentDetails=gameState?.state==='finished'||isAdmin;
  const canOpenPlayTabs=(myTeam&&gameState?.state==='in_progress'&&currentParticipant?.status==='assigned');
  let playerTabs;
  if(gameState?.state==='finished'){
    playerTabs=[{id:'home',icon:'home',label:'ホーム'},{id:'score',icon:'trophy',label:'スコア'},{id:'profile',icon:'user',label:'参加者'}];
  }else if(canOpenPlayTabs){
    playerTabs=mode==='double'
      ?[{id:'home',icon:'home',label:'ホーム'},{id:'bingo',icon:'grid',label:'ビンゴ'},{id:'arrival',icon:'pin',label:'到着'},{id:'mission',icon:'target',label:'ミッション'},{id:'score',icon:'trophy',label:'スコア'},{id:'profile',icon:'user',label:'参加者'}]
      :[{id:'home',icon:'home',label:'ホーム'},{id:'bingo',icon:'grid',label:'ビンゴ'},{id:'arrival',icon:'pin',label:'到着'},{id:'score',icon:'trophy',label:'スコア'},{id:'profile',icon:'user',label:'参加者'}];
  }else{
    playerTabs=[{id:'home',icon:'home',label:'ホーム'},{id:'profile',icon:'user',label:'参加者'}];
  }

  useEffect(()=>{
    if(showRule)return;
    if(isAdmin&&tab!=='admin')setTab('admin');
    if(!isAdmin&&tab==='admin')setTab('home');
  },[isAdmin,showRule,tab]);
  useEffect(()=>{
    if(isAdmin)return;
    if(!playerTabs.find(item=>item.id===tab))setTab('home');
  },[isAdmin,playerTabs,tab]);

  // スタート画面
  if(!sessionReady)return<div className="loading"><div className="spinner"></div><div style={{fontSize:12,color:'var(--muted)'}}>セッションを確認しています...</div></div>;
  if(screen==='start')return<>
    <Toast toasts={toasts}/>
    <StartScreen onOrganizer={()=>setScreen('organizer')} onPlayer={()=>setScreen('player')}/>
    <div style={{position:'fixed',bottom:16,right:16}}>
      <button className="btn ghost" style={{fontSize:10,color:'var(--muted)',padding:'4px 8px',margin:0,width:'auto'}} onClick={()=>setScreen('adminJoin')}><span className="icon-chip"><Icon name="lock" size={12}/>運営</span></button>
    </div>
  </>;

  if(screen==='organizer')return<>
    <Toast toasts={toasts}/>
    <OrganizerSetup onCreateGame={handleCreateGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='player')return<>
    <Toast toasts={toasts}/>
    <PlayerJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  if(screen==='adminJoin')return<>
    <Toast toasts={toasts}/>
    <AdminJoin onJoin={handleJoinGame} onBack={()=>setScreen('start')}/>
  </>;

  if(showRule&&gameState)return<>
    <Toast toasts={toasts}/>
    <RuleScreen gameState={gameState} onClose={()=>setShowRule(false)} requireConfirm={false}/>
  </>;

  const waitingMessage=currentParticipant?.status==='pending'
    ?'主催者の承認待ちです。承認されるまでこの画面のままお待ちください。'
    :currentParticipant?.status==='joined'
      ?'チーム編成中です。主催者がチームを割り当てるまでお待ちください。'
      :'ホームを表示中です。';

  // ゲーム画面
  return<div className="wrap">
    <Toast toasts={toasts}/>
    {showShare&&<ShareModal gameCode={gameState.gameCode} config={cfg} onClose={()=>setShowShare(false)}/>}

    <div className="hdr">
      <div className="logo">METRO RUN</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {isAdmin&&<div style={{background:'var(--surface-sub)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowShare(true)}>
          <span>招待コード</span><span style={{fontSize:9,color:'var(--muted)'}}><Icon name="share" size={11}/></span>
        </div>}
        {myTeam&&<div style={{background:'var(--surface-sub)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',fontSize:10,display:'flex',alignItems:'center',gap:5}}>
          <div className="dot" style={{background:myTeam.color}}></div>
          <span>{myTeam.name}</span>
        </div>}
        <button className="btn ghost" style={{fontSize:10,color:'var(--muted)',padding:'4px 8px',margin:0,width:'auto'}} onClick={()=>setShowRule(true)}><span className="icon-chip"><Icon name="book" size={12}/>ルール</span></button>
        {!isAdmin&&<div style={{textAlign:'right'}}>
          <div style={{fontSize:9,color:'var(--muted)'}}>残り</div>
          <div className={`timer ${isEnding?'end':''}`}>{timerStr}</div>
        </div>}
        {isAdmin&&<div style={{fontSize:11,color:'var(--red)',fontWeight:700,display:'flex',alignItems:'center',gap:5}}>
          ADMIN {pCount>0&&<span className="badge badge-pend">{pCount}</span>}
        </div>}
      </div>
    </div>

    {!isAdmin&&myTeam&&gameState?.state==='in_progress'&&<div className="sbar">
      <div className="si"><div className="sl">SCORE</div><div className="sv">{score.total}</div></div>
      {mode==='double'
        ?<><div className="si"><div className="sl">駅BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">ミッション</div><div className="sv p">{score.msB}</div></div></>
        :<><div className="si"><div className="sl">BINGO</div><div className="sv b">{score.stB}</div></div>
           <div className="si"><div className="sl">マス</div><div className="sv g">{score.masks}</div></div></>}
    </div>}

    {!isAdmin&&activeEvents.map(ev=>(
      <div key={ev.id} className="evbanner active">
        <span style={{fontSize:20}}><Icon name="alert" size={20}/></span>
        <div><div style={{fontSize:11,color:'var(--red)',fontWeight:700}}>イベント発動中！</div>
          <div style={{fontSize:12,fontWeight:700}}>{ev.name}</div>
          {ev.reward&&<div style={{fontSize:10,color:'var(--orange)',marginTop:1}}>報酬：{ev.reward}</div>}
        </div>
      </div>
    ))}

    <div className="nav">
      {(isAdmin?[{id:'admin',icon:'lock',label:'運営'}]:playerTabs).map(t=>(
        <button key={t.id} className={`nt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <span className="ni"><Icon name={t.icon} size={16}/></span>{t.label}
          {t.id==='admin'&&pCount>0&&<span className="badge badge-pend" style={{marginTop:1}}>{pCount}</span>}
        </button>
      ))}
    </div>

    <div className="cnt">
      {!isAdmin&&tab==='home'&&<div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14,marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{gameState.title}</div>
          <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>
            状態: {gameState.state}<br/>
            参加者: {currentParticipant?.name||'未参加'}<br/>
            {myTeam?`所属チーム: ${myTeam.name}`:'所属チーム: 未割り当て'}<br/>
            スタート駅: {gameState.startStationName||gameState.startStationId}
          </div>
        </div>
        {currentParticipant?.status!=='assigned'||gameState.state!=='in_progress'
          ?<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14}}>
            <div style={{fontWeight:700,marginBottom:6}}>{currentParticipant?.status==='pending'?'承認待ち':gameState.state==='finished'?'大会は終了しました':'待機中'}</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>{gameState.state==='finished'?'スコアタブからリザルトを確認できます。':waitingMessage}</div>
          </div>
          :<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:14}}>
            <div style={{fontWeight:700,marginBottom:6}}>ゲーム進行中</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.8}}>
              終盤になると相手チームの情報は自動で非表示になります。現在は {canViewOpponents?'表示中':'非表示'} です。
            </div>
          </div>}
      </div>}
      {tab==='bingo'&&gameState&&myTeam&&<BingoPage gameState={gameState} myTeamId={myTeamId} config={cfg} canViewOpponents={canViewOpponents} showOpponentDetails={showOpponentDetails}/>}
      {tab==='arrival'&&myTeam&&gameState.state==='in_progress'&&<ArrivalPage team={myTeam} config={cfg} onArrive={handleArrive}/>}
      {tab==='mission'&&myTeam&&mode==='double'&&gameState.state==='in_progress'&&<MissionPage team={myTeam} onSubmitMission={handleMissionSubmit}/>}
      {tab==='score'&&gameState&&<ScorePage gameState={gameState} myTeamId={myTeamId} isFinished={gameState.state==='finished'}/>}
      {tab==='profile'&&!isAdmin&&currentParticipant&&<div>
        <p className="sec">参加者情報</p>
        <input className="sinp" value={currentParticipant.name} onChange={e=>setGameState(gs=>gs?{...gs,participants:(gs.participants||[]).map(p=>p.id===currentParticipant.id?{...p,name:e.target.value}:p)}:gs)}/>
        <button className="btn pri" onClick={()=>handleRenameSelf((gameState?.participants||[]).find(p=>p.id===currentParticipant.id)?.name||currentParticipant.name)}>名前を更新</button>
        <button className="btn red" onClick={handleLeaveGame}>大会から離脱する</button>
        <p className="sec">名前変更履歴</p>
        {(currentParticipant.nameHistory||[]).slice().reverse().map((item,i)=><div key={i} className="li">
          <div className="lic st"><LogIcon type="st"/></div>
          <div className="lb"><div className="lt">{item.name}</div><div className="ls">{item.changedAt}</div></div>
        </div>)}
      </div>}
      {tab==='admin'&&gameState&&<AdminPage gameState={gameState} onFireEvent={handleFireEvent} onAddEvent={handleAddEvent} onApprove={handleApprove} onReject={handleReject} onApproveParticipant={handleApproveParticipant} onRejectParticipant={handleRejectParticipant} onAssignParticipant={handleAssignParticipant} onRenameTeam={handleRenameTeam} onSetTeamColor={handleSetTeamColor} onChangeGameState={handleChangeGameState} onAutoAssign={handleAutoAssign} onUpdateConfig={handleUpdateConfig} onAdjustScore={handleAdjustScore}/>}
      {isAdmin&&<div style={{marginTop:18}}>
        <button className="btn sec" onClick={handleExitToStart}>トップに戻る</button>
        {gameState?.state==='finished'&&<button className="btn pri" onClick={handleExitToStart}>新しい大会を作る</button>}
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
